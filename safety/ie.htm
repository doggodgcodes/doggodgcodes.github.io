<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge"> <!-- Ensures latest IE rendering mode -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IE unsupported</title>
</head>
<body>

  <h1>Your browser is unsupported. Please upgrade to a newer browser.</h1>

  <!--[if IE]>
    <p style="color: red;">You are using Internet Explorer.</p>
  <![endif]-->

  <!--[if IE 6]>
    <p style="color: orange;">IE 6 detected!</p>
  <![endif]-->

  <!--[if IE 7]>
    <p style="color: orange;">IE 7 detected!</p>
  <![endif]-->

  <!--[if IE 8]>
    <p style="color: orange;">IE 8 detected!</p>
  <![endif]-->

  <!--[if IE 9]>
    <p style="color: orange;">IE 9 detected!</p>
  <![endif]-->

  <script>
    console.log("This works in all browsers.");
  </script>
</body>
</html>
