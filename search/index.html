<!doctype html>
<html>
  <head>
    <title>Quick Search</title>
    <style>
      body {
        background-color: skyblue;
        font-family: "Segoe UI", sans-serif;
        padding: 75px;
        align-content: center;
        margin-top: 50vh;
      }
    </style>
  </head>
  <body>
    <center><h1>Redirecting...<!--Quick Search by doggodgcodes--><!-- For quick shortcuts, we redirect you. --></h1></center>
    <script>
      console.log("Gemini helped fix some stuff");
      // 1. Get the query string from the current URL (?q=html)
      const queryString = window.location.search;

      // 2. Parse the parameters
      const urlParams = new URLSearchParams(queryString);

      // 3. Get the value of 'q'
      const q = urlParams.get('q')?.toLowerCase() ?? "";
      let link = "";

      if (!q) {
        link = "https://doggodgcodes.github.io/search/noresults.html"; 
      }
      else if (q === "html") {
        link = "https://github.com/doggodgcodes/html-site-template/";
      }
      else if (q === "dgdog" || q === "doggodgcodes" || q === "dg") {
        link = "https://github.com/doggodgcodes/";
      }
      else if (q === "minechicken") {
        link = "https://github.com/minechicken98/";
      }
      else if (q === "funny") {
        link = "https://github.com/minechicken98/funny/";
      }
      else if (q === "google") {
        link = "https://google.com/";
      }
      else if (q === "random") {
        link = "https://doggodgcodes.github.io/random/";
      }
      else if (q === "anychar" || q === "onechar") {
        link = "https://github.com/doggodgcodes/anychar/";
      }
      else if (q === "bing") {
        link = "https://bing.com/";
      }
      else if (q === "scratch") {
        link = "https://scratch.mit.edu/";
      }
      else if (q === "youtube") {
        link = "https://youtube.com";
      }
      else if (q === "downdetector") {
        link = "https://downdetector.com";
      }
      else if (q === "gemini") {
        link = "https://gemini.google.com";
      }
      else if (q === "github") {
        link = "https://github.com";
      }
      else if (q === "funny/issue/3") {
        link = "https://github.com/minechicken98/funny/issues/3";
      }
      else if (q === "funny/issue/11") {
        link = "https://github.com/minechicken98/funny/issues/11";
      }
      else if (q === "funny/pull/2" || q === "funny/merge/2" || q === "funny/merged/2") {
        link = "https://github.com/minechicken98/funny/pull/2";
      }
      else if (q === "funny/pull/10") { // || q === "funny/merge/10" || q === "funny/merged/10"
        link = "https://github.com/minechicken98/funny/pull/10";
      }
      else {
        link = "https://google.com/search?q=" + encodeURIComponent(q);
      }
      
      window.location.href = link;
    </script>
  </body>
</html>
