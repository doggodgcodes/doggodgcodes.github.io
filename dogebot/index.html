  }

  sigmoid(x) { return 1 / (1 + Math.exp(-x)); }
  sigmoidDeriv(y) { return y * (1 - y); }
  tanhDeriv(y) { return 1 - y * y; }

  updateEmotion(text) {
    const t = text.toLowerCase();
    for (let k in this.emotion) this.emotion[k] *= this.emotionDecay;
    if (t.includes("lol") || t.includes("haha") || t.includes("funny")) this.emotion.happy += 0.6;
    if (t.includes("confused") || t.includes("what") || t.includes("huh")) this.emotion.confused += 0.6;
    if (t.includes("angry") || t.includes("mad")) this.emotion.angry += 0.7;
    if (t.includes("!") || t.includes("wow") || t.includes("omg")) this.emotion.excited += 0.5;
    const sum = this.emotion.happy + this.emotion.confused + this.emotion.angry + this.emotion.excited;
    this.emotion.neutral = Math.max(0, 1 - sum);
  }

  registerWord(word) {
    if (this.vocabMap.has(word)) return this.vocabMap.get(word);

    if (this.vocab.length >= this.maxVocab) {
      const removed = this.vocab.shift();
      this.vocabMap.delete(removed);
      this.embeddings.shift();
    }

    const idx = this.vocab.length;
    this.vocab.push(word);
    this.vocabMap.set(word, idx);

    const vec = new Float32Array(this.dim);
    for (let i = 0; i < this.dim; i++) {
      vec[i] = (Math.random() - 0.5) * 0.05;
    }

    this.embeddings.push(vec);
    return idx;
  }

  dot(a, b) {
    let sum = 0;
    for (let i = 0; i < this.dim; i++) sum += a[i] * b[i];
    return sum;
  }

  updateContext(vec) {
    for (let i = 0; i < this.dim; i++) this.contextVec[i] = this.contextVec[i] * 0.9 + vec[i] * 0.1;
  }

  updateHumor(vec) {
    for (let i = 0; i < this.dim; i++) this.humorVec[i] = this.humorVec[i] * 0.92 + vec[i] * 0.08;
  }

  // =========================================================================
  // 🧠 NEOCORE 5 VECTOR CONVERSION & MEMORY RETRIEVAL SYSTEM
  // =========================================================================
  getVector(text) {
    const tokens = text.toLowerCase().replace(/[^\w\s]/g, "").split(/\s+/).filter(Boolean);
    const vec = new Float32Array(this.dim);
    if (tokens.length === 0) return vec;
    
    let count = 0;
    for (const token of tokens) {
      if (this.vocabMap.has(token)) {
        const idx = this.vocabMap.get(token);
        const emb = this.embeddings[idx];
        for (let d = 0; d < this.dim; d++) {
          vec[d] += emb[d];
        }
        count++;
      }
    }
    if (count > 0) {
      for (let d = 0; d < this.dim; d++) {
        vec[d] /= count;
      }
    }
    return vec;
  }

  cosineSimilarity(vecA, vecB) {
    let dotProduct = 0;
    let normA = 0;
    let normB = 0;
    for (let i = 0; i < this.dim; i++) {
      dotProduct += vecA[i] * vecB[i];
      normA += vecA[i] * vecA[i];
      normB += vecB[i] * vecB[i];
    }
    if (normA === 0 || normB === 0) return 0;
    return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB));
  }

  retrieveAndBlendMemories(userText) {
    const queryVec = this.getVector(userText);
    
    // Store current message vector inside historical memory slots
    this.memories.push({ text: userText, vector: queryVec });
    if (this.memories.length < 2) return;

    const scores = [];
    // Compare current state query with all stored conversation memory slots
    for (let i = 0; i < this.memories.length - 1; i++) {
      const mem = this.memories[i];
      const similarity = this.cosineSimilarity(queryVec, mem.vector);
      scores.push({ mem, similarity });
    }

    scores.sort((a, b) => b.similarity - a.similarity);
    
    // Dynamically safely calculate optimal cluster matching sizes (top 3-7 memories)
    const topCount = Math.min(Math.max(3, Math.min(7, scores.length)), scores.length);
    const topMemories = scores.slice(0, topCount);

    // Blend fetched elements contextually right into contextVec profiles
    for (const item of topMemories) {
      for (let d = 0; d < this.dim; d++) {
        this.contextVec[d] = this.contextVec[d] * 0.82 + item.mem.vector[d] * 0.18;
      }
    }
  }

  // =========================================================================
  // 📉 BACKPROPAGATION TRAINING MATRIX LOOP
  // =========================================================================
  trainSentence(text) {
    const tokens = text
      .toLowerCase()
      .replace(/\./g, "")
      .split(/\s+/)
      .filter(Boolean);

    if (tokens.length < 2) return;

    this.startTokens.add(tokens[0]);
    this.endTokens.add(tokens[tokens.length - 1]);

    for (let i = 0; i < tokens.length - 1; i++) {
      const a = this.registerWord(tokens[i]);
      const b = this.registerWord(tokens[i + 1]);

      const biKey = tokens[i];
      if (!this.bigramMap.has(biKey)) this.bigramMap.set(biKey, []);
      this.bigramMap.get(biKey).push(tokens[i + 1]);

      if (i < tokens.length - 2) {
        const triKey = tokens[i] + "_" + tokens[i + 1];
        if (!this.trigramMap.has(triKey)) this.trigramMap.set(triKey, []);
        this.trigramMap.get(triKey).push(tokens[i + 2]);
      }

      if (i < tokens.length - 3) {
        const quadKey = tokens[i] + "_" + tokens[i + 1] + "_" + tokens[i + 2];
        if (!this.quadgramMap.has(quadKey)) this.quadgramMap.set(quadKey, []);
        this.quadgramMap.get(quadKey).push(tokens[i + 3]);
      }

      // 🧬 Populate Pentagram Map Layer Space (5-Token Chain System Constraint)
      if (i < tokens.length - 4) {
        const pentaKey = tokens[i] + "_" + tokens[i + 1] + "_" + tokens[i + 2] + "_" + tokens[i + 3];
        if (!this.pentagramMap.has(pentaKey)) this.pentagramMap.set(pentaKey, []);
        this.pentagramMap.get(pentaKey).push(tokens[i + 4]);
      }

      // 🌌 Populate Hexagram Map Layer Space (6-Token Chain System Constraint)
      if (i < tokens.length - 5) {
        const hexaKey = tokens[i] + "_" + tokens[i + 1] + "_" + tokens[i + 2] + "_" + tokens[i + 3] + "_" + tokens[i + 4];
        if (!this.hexagramMap.has(hexaKey)) this.hexagramMap.set(hexaKey, []);
        this.hexagramMap.get(hexaKey).push(tokens[i + 5]);
      }

      const inputVec = this.embeddings[a]; 

      const hiddenOutputs = new Float32Array(this.dim);
      for (let h = 0; h < this.dim; h++) {
        let sum = inputVec[h] + this.biasHidden[h]; 
        hiddenOutputs[h] = Math.tanh(sum); 
      }

      const outputFeatures = new Float32Array(this.dim);
      for (let o = 0; o < this.dim; o++) {
        let sum = 0;
        for (let h = 0; h < this.dim; h++) {
          sum += hiddenOutputs[h] * this.W_hidden_to_output[h][o]; 
        }
        outputFeatures[o] = this.sigmoid(sum + this.biasOutput[o]); 
      }

      const targetVec = this.embeddings[b];

      const deltaOutput = new Float32Array(this.dim);
      for (let o = 0; o < this.dim; o++) {
        let error = targetVec[o] - outputFeatures[o];
        deltaOutput[o] = error * this.sigmoidDeriv(outputFeatures[o]); 
      }

      const deltaHidden = new Float32Array(this.dim);
      for (let h = 0; h < this.dim; h++) {
        let errorSum = 0;
        for (let o = 0; o < this.dim; o++) {
          errorSum += deltaOutput[o] * this.W_hidden_to_output[h][o];
        }
        deltaHidden[h] = errorSum * this.tanhDeriv(hiddenOutputs[h]); 
      }

      for (let o = 0; o < this.dim; o++) {
        this.biasOutput[o] += this.learningRate * deltaOutput[o];
        for (let h = 0; h < this.dim; h++) {
          this.W_hidden_to_output[h][o] += this.learningRate * deltaOutput[o] * hiddenOutputs[h];
        }
      }

      for (let h = 0; h < this.dim; h++) {
        this.biasHidden[h] += this.learningRate * deltaHidden[h];
        this.embeddings[a][h] += this.learningRate * deltaHidden[h]; 
      }
    }
  }

  // =========================================================================
  // ⚡️ THINKING GAP PROCESSOR LAYER SHIELD
  // =========================================================================
  async computeInTheGap(userText, datasetArray) {
    return new Promise((resolve) => {
      // Process conversational retrieval matrix and combine tracking points contextually
      this.retrieveAndBlendMemories(userText);

      const tokens = userText.toLowerCase().replace(/[^\w\s]/g, "").split(/\s+/).filter(Boolean);
      if (tokens.length > 0) {
        let firstWordIdx = this.vocabMap.get(tokens[0]) ?? this.registerWord(tokens[0]);
        for (let d = 0; d < this.dim; d++) {
          this.pinnedContextVec[d] = this.embeddings[firstWordIdx][d];
        }
        this.hasPinnedAnchor = true;
      }

      // was 8 steps, but performance matters
      for (let steps = 0; steps < 6; steps++) {
        this.trainSentence(userText); 
        if (datasetArray && datasetArray.length > 0) {
          const randomLore = datasetArray[Math.floor(Math.random() * datasetArray.length)];
          this.trainSentence(randomLore);
        }
      }
      resolve(true);
    });
  }

  startDaydreaming(datasetArray) {
    if (!datasetArray || datasetArray.length === 0) return;
    const loop = () => {
      if (typeof requestIdleCallback !== "undefined") {
        requestIdleCallback((deadline) => {
          if (deadline.timeRemaining() > 5) {
            const pick = datasetArray[Math.floor(Math.random() * datasetArray.length)];
            this.trainSentence(pick);
          }
          setTimeout(loop, 15000);
        });
      } else {
        setTimeout(() => {
          const pick = datasetArray[Math.floor(Math.random() * datasetArray.length)];
          this.trainSentence(pick);
          loop();
        }, 15000);
      }
    };
    loop();
  }

  getFuzzyCadenceMetric(wordA, wordB) {
    if (!wordA || !wordB) return 0;
    const lenDist = Math.abs(wordA.length - wordB.length);
    if (lenDist > 2) return 0; 

    let matches = 0;
    const minLen = Math.min(wordA.length, wordB.length);
    for (let i = 0; i < minLen; i++) {
      if (wordA[i] === wordB[i]) matches++;
    }
    
    return (matches / wordA.length) * (1 - lenDist * 0.15);
  }

  formatText(text) {
    const words = text.split(" ");
    let out = [];
    for (let i = 0; i < words.length; i++) {
      let w = words[i];
      if (!w) continue;
      if (i === 0 || out[out.length - 1]?.endsWith(".")) w = w.charAt(0).toUpperCase() + w.slice(1);
      const r = Math.random();
      if (i < words.length - 1) {
        if (r < 0.08) w += ","; 
        else if (r < 0.09) w += ".";
      }
      out.push(w);
    }
    if (Math.random() > 0.5) {
      out.push(" :3");
    }
    if (Math.random() > 0.7) {
      out.push(" xd");
    }
    if (out.length > 0 && !/[.!?]$/.test(out[out.length - 1])) out[out.length - 1] += ".";
    return out.join(" ");
  }

  // =========================================================================
  // 🔮 SEQUENCE GENERATION WITH MULTI-TIER FILTER MATRIX
  // =========================================================================
  // base temp og 0.75
  generateResponse(seed, maxTokens = 15, baseTemperature = 1.2, topK = 8) {
    if (this.vocab.length === 0) return "MATRIX FEED COMPROMISED.";

    this.updateEmotion(seed);

    const tokens = seed
      .toLowerCase()
      .replace(/[^\w\s]/g, "")
      .split(/\s+/)
      .filter(Boolean);

    let currIdx = this.vocabMap.get(tokens[tokens.length - 1]) ?? 
                  this.vocabMap.get(tokens[0]) ?? 
                  0;

    let generated = [];
    let currTokenStr = this.vocab[currIdx] || "start";

    const lexicalVariance = tokens.length > 0 ? tokens.length / this.vocab.length : 0.5;
    const scaledTemp = baseTemperature * (0.7 + 0.6 * lexicalVariance);

    for (let i = 0; i < maxTokens; i++) {
      let candidates = [];

      // 🔤 Try Hexagram (6-gram) prediction
      const hexaKey = this.vocab
        .slice(Math.max(0, this.vocab.length - 5))
        .join("_");
      if (this.hexagramMap.has(hexaKey)) {
        const follow = this.hexagramMap.get(hexaKey);
        if (follow.length > 0) {
          candidates = [...new Set(follow)];
        }
      }

      // 🔤 Try Pentagram (5-gram) prediction if no hexa results
      if (candidates.length === 0) {
        const pentaKey = this.vocab
          .slice(Math.max(0, this.vocab.length - 4))
          .join("_");
        if (this.pentagramMap.has(pentaKey)) {
          const follow = this.pentagramMap.get(pentaKey);
          if (follow.length > 0) {
            candidates = [...new Set(follow)];
          }
        }
      }

      // 🔤 Try Quad-gram prediction if no penta results
      if (candidates.length === 0) {
        const quadKey = this.vocab
          .slice(Math.max(0, this.vocab.length - 3))
          .join("_");
        if (this.quadgramMap.has(quadKey)) {
          const follow = this.quadgramMap.get(quadKey);
          if (follow.length > 0) {
            candidates = [...new Set(follow)];
          }
        }
      }

      // 🔤 Try Trigram prediction if no quad results
      if (candidates.length === 0) {
        const triKey = this.vocab
          .slice(Math.max(0, this.vocab.length - 2))
          .join("_");
        if (this.trigramMap.has(triKey)) {
          const follow = this.trigramMap.get(triKey);
          if (follow.length > 0) {
            candidates = [...new Set(follow)];
          }
        }
      }

      // 🔤 Try Bigram prediction if no tri results
      if (candidates.length === 0) {
        if (this.bigramMap.has(currTokenStr)) {
          const follow = this.bigramMap.get(currTokenStr);
          if (follow.length > 0) {
            candidates = [...new Set(follow)];
          }
        }
      }

      // 🔤 Fallback: Random vocab sampling
      if (candidates.length === 0) {
        const startCandidates = Array.from(this.startTokens);
        if (startCandidates.length > 0) {
          candidates = startCandidates;
        } else {
          candidates = [this.vocab[Math.floor(Math.random() * this.vocab.length)] || "end"];
        }
      }

      // 🔤 Gumbel-Max with Top-K Filtering (smooth temperature-driven sampling)
      const scored = candidates.map((w) => {
        const freq = (this.bigramMap.get(currTokenStr) || []).filter((x) => x === w).length + 1;
        const cadence = this.getFuzzyCadenceMetric(currTokenStr, w);
        const emotionBoost =
          w.includes("!") || w.includes("?") ? this.emotion.excited * 0.3 : 0;
        const score = Math.log(freq) + cadence * 0.5 + emotionBoost;
        return { word: w, score };
      });

      scored.sort((a, b) => b.score - a.score);
      const topCandidates = scored.slice(0, topK);

      const logits = topCandidates.map((c) => c.score / Math.max(0.01, scaledTemp));
      const probs = this.softmax(logits);

      const sample = this.sampleFromDist(probs);
      const nextWord = topCandidates[sample].word;

      if (this.endTokens.has(nextWord)) break;

      generated.push(nextWord);
      currIdx = this.vocabMap.get(nextWord) ?? currIdx;
      currTokenStr = nextWord;
      this.vocab.push(nextWord);
    }

    const rawResponse = generated.join(" ");
    return this.formatText(rawResponse);
  }

  softmax(logits) {
    const maxLogit = Math.max(...logits);
    const expLogits = logits.map((l) => Math.exp(l - maxLogit));
    const sumExp = expLogits.reduce((a, b) => a + b, 0);
    return expLogits.map((e) => e / sumExp);
  }

  sampleFromDist(probs) {
    let r = Math.random();
    for (let i = 0; i < probs.length; i++) {
      r -= probs[i];
      if (r < 0) return i;
    }
    return probs.length - 1;
  }
}
