<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glitch Chaos YouTube</title>

<!-- Your base CSS -->
<link rel="stylesheet" href="https://doggodgcodes.github.io/ai/styles.css">
<!-- Glitchazon -->
<link rel="stylesheet" href="https://doggodgcodes.github.io/mine-chicken-dg/css-mine-chicken/glitchazon.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url("https://doggodgcodes.github.io/assets/fonts/css/dg-dingus.css");
body {
  font-family: "DG Dingus", "Segoe UI", Arial, sans-serif;
  background: linear-gradient(to bottom, white, skyblue);
  color: #333;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* Header */
header {
  text-align: center;
  padding: 20px;
  background-color: rgba(255,255,255,0.8);
  margin-bottom: 20px;
}

header h1 {
  margin: 0;
  color: #333;
  font-family: monospace;
  animation: bulge 2s infinite alternate;
}

/* GRID */
.grid-container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
  max-width: 400px;
  margin: 0 auto;
  padding: 0 20px;
  flex: 1;
}

.grid-item {
  backdrop-filter: blur(100px);
  -webkit-backdrop-filter: blur(100px);
  opacity: 0.8;
  background: linear-gradient(45deg, #f0f8ff 25%, transparent 25%), linear-gradient(-45deg, #f0f8ff 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #f0f8ff 75%), linear-gradient(-45deg, transparent 75%, #f0f8ff 75%);
  background-size: 20px 20px;
  background-position: 0 0,0 10px,10px -10px,-10px 0px;
  width: 100%;
  background-color: rgba(255,255,255,0.9);
  color: #333;
  text-align: center;
  padding: 20px;
  border-radius: 5px;
  text-decoration: none;
  font-weight: bold;
  border: 1px solid skyblue;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  filter: url(#glitchFilter);
}

.grid-item:hover {
  background-color: skyblue;
  color: navy;
  transform: perspective(500px) rotateX(5deg) rotateY(-5deg) scale(1.05);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Footer */
footer {
  text-align: center;
  padding: 15px;
  background-color: rgba(255,255,255,0.8);
  margin-top: 20px;
}
.credit {
  font-size: 0.9em;
  color: #666;
  font-weight: bold;
}

/* XP POPUPS */
.xp {
  position: absolute;
  width: 250px;
  background: linear-gradient(#3a6ea5,#245edb);
  border: 3px solid #fff;
  color: white;
  font-family: Arial;
  box-shadow: 5px 5px 0 black;
  padding: 10px;
  cursor: grab;
  z-index:1000;
}

/* PARTICLES */
.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  pointer-events: none;
  border-radius: 50%;
  animation: explode 1s linear forwards;
}
@keyframes explode {
  to { transform: translate(var(--x),var(--y)) scale(0); opacity:0; }
}
.trail {
  position: fixed;
  width: 10px;
  height: 10px;
  background: hotpink;
  pointer-events: none;
  border-radius: 50%;
  opacity: 0.7;
  animation: fade 0.5s linear forwards;
}
@keyframes fade {
  to { opacity:0; transform: scale(0.5); }
}

/* MINI BSOD */
#bsod {
  position: fixed;
  inset:0;
  background:#0000aa;
  color:#fff;
  font-family: Consolas, monospace;
  display:none;
  z-index:99999;
  padding:40px;
}

/* CURSOR */
body.cursor-glitch {
  cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><text y="15" font-size="15">❌</text></svg>'), auto;
}

/* GLITCHY BULGE ANIMATION */
@keyframes bulge {
  0% { transform: scale(1) rotate(0deg) skew(0deg); filter: hue-rotate(0deg); }
  25% { transform: scale(1.05) rotate(-1deg) skew(1deg); filter: hue-rotate(45deg); }
  50% { transform: scale(0.95) rotate(1deg) skew(-1deg); filter: hue-rotate(90deg); }
  75% { transform: scale(1.05) rotate(-1deg) skew(1deg); filter: hue-rotate(135deg); }
  100% { transform: scale(1) rotate(0deg) skew(0deg); filter: hue-rotate(180deg); }
}
</style>

<body class="cursor-glitch">
  <iframe src="https://minechicken98.github.io/funny/glitchazon"></iframe>
<iframe src="https://minechicken98.github.io/funny/flappy-rage"></iframe>
<iframe width="560" height="315" src="https://www.youtube.com/embed/weyMeZ0uwTM?si=4KY_i7OJ0JnOW_zr" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
<header>
  <h1 class="glitch">CHAOS YOUTUBE</h1>
</header>

<div class="grid-container">
  <a href="https://www.youtube.com/" target="_blank" class="grid-item">YouTube: Cat Chaos</a>
</div>

<footer>
  <div class="credit">Created by ChatGPT and doggodgcodes</div>
</footer>

<div id="bsod">
  <h2>A problem has been detected and this is not a real bluescreen.</h2>
  <p>yum</p>
  <p>Beginning dump of nonexistent memory...</p>
</div>

<script>
/* MEOWSYNTH AUDIO */
const audio = document.createElement("audio");
audio.src = "https://thirtydollar.website/sounds/meowsynth.wav";
audio.autoplay = true;
audio.loop = true;
document.body.appendChild(audio);
document.addEventListener("click", ()=>audio.play());

/* XP POPUPS */
function spawnXP() {
  const div = document.createElement("div");
  div.className="xp";
  div.style.left=Math.random()*window.innerWidth+"px";
  div.style.top=Math.random()*window.innerHeight+"px";
  div.innerHTML="<b>⚠️ ERROR</b><br>Something went terribly wrong.";
  document.body.appendChild(div);
  bounce(div);
}
function bounce(el){
  let dx=2+Math.random()*3, dy=2+Math.random()*3;
  function move(){
    const rect=el.getBoundingClientRect();
    if(rect.left<=0||rect.right>=window.innerWidth) dx*=-1;
    if(rect.top<=0||rect.bottom>=window.innerHeight) dy*=-1;
    el.style.left=rect.left+dx+"px";
    el.style.top=rect.top+dy+"px";
    requestAnimationFrame(move);
  }
  move();
}
setInterval(spawnXP,3000);

/* CURSOR TRAIL */
document.addEventListener("mousemove", e=>{
  const t=document.createElement("div");
  t.className="trail";
  t.style.left=e.clientX+"px";
  t.style.top=e.clientY+"px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),500);
});

/* PARTICLES ON CLICK */
document.addEventListener("click", e=>{
  for(let i=0;i<20;i++){
    const p=document.createElement("div");
    p.className="particle";
    const angle=Math.random()*2*Math.PI;
    const dist=Math.random()*100;
    p.style.left=e.clientX+"px";
    p.style.top=e.clientY+"px";
    p.style.background=`hsl(${Math.random()*360},100%,50%)`;
    p.style.setProperty("--x",Math.cos(angle)*dist+"px");
    p.style.setProperty("--y",Math.sin(angle)*dist+"px");
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
});

/* MINI BSOD */
function triggerBSOD(){
  const bsod=document.getElementById("bsod");
  bsod.style.display="block";
  setTimeout(()=>bsod.style.display="none",1500);
}
setInterval(()=>{if(Math.random()<0.2)triggerBSOD()},5000);

/* GLITCH BODY */
setInterval(()=>document.body.classList.toggle("glitch"),2000);
</script>

</body>
</html>
