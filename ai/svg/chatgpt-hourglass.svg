<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Frame -->
  <rect x="60" y="10" width="80" height="20" fill="#444"/>
  <rect x="60" y="270" width="80" height="20" fill="#444"/>
  
  <!-- Glass outline -->
  <path d="M60 30 
           C60 100, 140 100, 140 150 
           C140 200, 60 200, 60 270" 
        fill="none" stroke="#444" stroke-width="4"/>
  
  <path d="M140 30 
           C140 100, 60 100, 60 150 
           C60 200, 140 200, 140 270" 
        fill="none" stroke="#444" stroke-width="4"/>

  <!-- Top sand -->
  <polygon points="70,40 130,40 100,120" fill="#f4c542"/>

  <!-- Falling sand -->
  <line x1="100" y1="120" x2="100" y2="180" stroke="#f4c542" stroke-width="3"/>

  <!-- Bottom sand -->
  <polygon points="70,260 130,260 100,180" fill="#f4c542"/>
</svg>
