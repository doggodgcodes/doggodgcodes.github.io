<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IDLE CREATOR SIMULATOR</title>
    <link rel="icon" href="[https://minechicken98.github.io/funny/battle-cats-capsule/images/cat.png](https://minechicken98.github.io/funny/battle-cats-capsule/images/cat.png)">
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #e0f7fa 0%, #80deea 100%); /* FRUTIGER AERO VIBES */
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container { background: rgba(255, 255, 255, 0.7); border-radius: 15px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.1); backdrop-filter: blur(10px); }
        .tab-content { display: none; padding: 20px; border-top: 2px solid #fff; }
        .active { display: block; }
        button { cursor: pointer; padding: 10px 20px; border-radius: 20px; border: 1px solid #fff; background: #00d2ff; color: white; font-weight: bold; box-shadow: 0 4px #0099cc; transition: 0.1s; }
        button:active { transform: translateY(4px); box-shadow: 0 0 #0099cc; }
        .pfp { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎧 BONK-TUBER SIM 🎧</h1>
        <img id="currentPfp" class="pfp" src="[https://yt3.googleusercontent.com/nMwX4c9fVcyxWNcVGKMsesmY3GU75jcDkrcK3ablWbd3xkpy1jxNTF5NXV29Miut87n31SskHw=s160-c-k-c0x00ffffff-no-rj](https://yt3.googleusercontent.com/nMwX4c9fVcyxWNcVGKMsesmY3GU75jcDkrcK3ablWbd3xkpy1jxNTF5NXV29Miut87n31SskHw=s160-c-k-c0x00ffffff-no-rj)" onclick="changePfp()">
        <p>Subs: <span id="subs">0</span> | Views: <span id="views">0</span> | Money: $<span id="money">0</span></p>
        
        <nav>
            <button onclick="showTab('video')">VIDEOS</button>
            <button onclick="showTab('ads')">SPONSORS</button>
            <button onclick="showTab('shop')">SHOP</button>
        </nav>

        <!-- VIDEO TAB -->
        <div id="video" class="tab-content active">
            <h3>UPLOAD CONTENT</h3>
            <input type="text" id="vidTitle" placeholder="Video Title...">
            <select id="vidTopic">
                <option value="Aero">Frutiger Aero</option>
                <option value="Minecraft">Minecraft</option>
                <option value="Gorilla Tag">Gorilla Tag</option>
                <option value="Cooking">PBJ Cooking</option>
            </select>
            <button onclick="uploadVideo()">UPLOAD!</button>
            <div id="videoList"></div>
        </div>

        <!-- ADS TAB -->
        <div id="ads" class="tab-content">
            <h3>SPONSOR REQUESTS</h3>
            <div id="adOffer">
                <p id="adText">Wait for offers...</p>
                <button id="adBtn" style="display:none;" onclick="acceptAd()">Accept Sponsor!</button>
            </div>
        </div>

        <!-- SHOP TAB -->
        <div id="shop" class="tab-content">
            <h3>UPGRADE GEAR</h3>
            <button onclick="buyUpgrade(50, 'Mic')">New Mic ($50)</button>
            <button onclick="buyUpgrade(200, 'PC')">Aero PC ($200)</button>
        </div>
    </div>

    <audio id="bgm" loop>
        <source src="[https://minechicken98.github.io/funny/slice-beats/Chocolate](https://minechicken98.github.io/funny/slice-beats/Chocolate) Party by Mine Chicken.mp3" type="audio/mpeg">
    </audio>

    <script>
        let stats = JSON.parse(localStorage.getItem('bonkStats')) || { subs: 0, views: 0, money: 0, vids: [], gear: 1, pfpIdx: 0 };
        const pfps = [
            "[https://yt3.googleusercontent.com/nMwX4c9fVcyxWNcVGKMsesmY3GU75jcDkrcK3ablWbd3xkpy1jxNTF5NXV29Miut87n31SskHw=s160-c-k-c0x00ffffff-no-rj](https://yt3.googleusercontent.com/nMwX4c9fVcyxWNcVGKMsesmY3GU75jcDkrcK3ablWbd3xkpy1jxNTF5NXV29Miut87n31SskHw=s160-c-k-c0x00ffffff-no-rj)",
            "[https://yt3.ggpht.com/ERio1I1-viDXodzrvSgS_7ooGyD6UpAimGgQkUha23WTAl1oYfOqIqdcjI48yNtJ1b8t_9Fh=s176-c-k-c0x00ffffff-no-rj-mo](https://yt3.ggpht.com/ERio1I1-viDXodzrvSgS_7ooGyD6UpAimGgQkUha23WTAl1oYfOqIqdcjI48yNtJ1b8t_9Fh=s176-c-k-c0x00ffffff-no-rj-mo)",
            "[https://yt3.googleusercontent.com/Ih6ETBj-ts8JemQ1axbN6liYfs537LUZCv-DiZQcW6cPkYsbFtE1AwnlTbAlRs1VK3Vpm9ai0Q8=s160-c-k-c0x00ffffff-no-rj](https://yt3.googleusercontent.com/Ih6ETBj-ts8JemQ1axbN6liYfs537LUZCv-DiZQcW6cPkYsbFtE1AwnlTbAlRs1VK3Vpm9ai0Q8=s160-c-k-c0x00ffffff-no-rj)"
        ];

        function updateUI() {
            document.getElementById('subs').innerText = stats.subs;
            document.getElementById('views').innerText = stats.views;
            document.getElementById('money').innerText = stats.money;
            document.getElementById('currentPfp').src = pfps[stats.pfpIdx];
            localStorage.setItem('bonkStats', JSON.stringify(stats));
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('bgm').play().catch(()=>{});
        }

        function uploadVideo() {
            let t = document.getElementById('vidTitle').value || "Silly Video";
            let top = document.getElementById('vidTopic').value;
            let newViews = Math.floor(Math.random() * 100 * stats.gear);
            let newSubs = Math.floor(newViews * 0.1);
            stats.views += newViews;
            stats.subs += newSubs;
            stats.money += Math.floor(newViews * 0.05);
            stats.vids.push({title: t, topic: top, v: newViews, s: newSubs});
            renderVids();
            updateUI();
        }

        function renderVids() {
            document.getElementById('videoList').innerHTML = stats.vids.map(v => 
                `<p><b>${v.title}</b> (${v.topic}) - 👀 ${v.v} | 🚩 ${v.s}</p>`).reverse().join('');
        }

        function changePfp() {
            stats.pfpIdx = (stats.pfpIdx + 1) % pfps.length;
            updateUI();
        }

        function buyUpgrade(cost, name) {
            if(stats.money >= cost) {
                stats.money -= cost;
                stats.gear++;
                alert("Upgraded to " + name + "!");
                updateUI();
            }
        }

        // Random Sponsor logic
        setInterval(() => {
            if(Math.random() > 0.7) {
                document.getElementById('adText').innerText = "Sponsor Offer: $100!";
                document.getElementById('adBtn').style.display = "inline-block";
            }
        }, 5000);

        function acceptAd() {
            stats.money += 100;
            document.getElementById('adText').innerText = "Accepted! Wait for more...";
            document.getElementById('adBtn').style.display = "none";
            updateUI();
        }

        updateUI();
        renderVids();
    </script>
</body>
</html>
