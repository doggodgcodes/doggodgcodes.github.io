<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🎹 CHROME LAB x FL STUDIO ULTIMATE DAWS v8.0 🥁</title>
    <style>
        body {
            background: linear-gradient(135deg, #020617, #1e1b4b, #311042);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #00FFCC;
            text-shadow: 4px 4px 0px #FF0066;
            font-size: 2.8rem;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #ffb703;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        /* Dashboard Panel */
        .dashboard {
            background: rgba(15, 23, 42, 0.8);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #38bdf8;
            max-width: 800px;
            margin: 0 auto 20px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
            color: #cbd5e1;
        }
        .control-group input {
            margin-top: 8px;
            cursor: pointer;
        }
        /* Scrollable Workspaces */
        .workspace {
            overflow-x: auto;
            max-width: 95vw;
            margin: 0 auto;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
        }
        .section-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 10px 0;
            color: #a5b4fc;
        }
        /* Matrix Grids */
        .grid-container {
            display: grid;
            gap: 4px;
            justify-content: start;
            width: fit-content;
            margin: 0 auto;
            padding: 10px;
        }
        .pad {
            width: 45px;
            height: 32px;
            background-color: #334155;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.05s ease;
        }
        /* Chromatic 12-Tone Scale Pastel Colors */
        .pad.note-0 { border-left: 4px solid #ff595e; } /* C */
        .pad.note-1 { border-left: 4px solid #ff924c; } /* C# */
        .pad.note-2 { border-left: 4px solid #ffca3a; } /* D */
        .pad.note-3 { border-left: 4px solid #c5ca30; } /* D# */
        .pad.note-4 { border-left: 4px solid #8ac926; } /* E */
        .pad.note-5 { border-left: 4px solid #52b788; } /* F */
        .pad.note-6 { border-left: 4px solid #1982c4; } /* F# */
        .pad.note-7 { border-left: 4px solid #4267b2; } /* G */
        .pad.note-8 { border-left: 4px solid #6a4c93; } /* G# */
        .pad.note-9 { border-left: 4px solid #b5179e; } /* A */
        .pad.note-10 { border-left: 4px solid #7209b7; } /* A# */
        .pad.note-11 { border-left: 4px solid #f72585; } /* B */

        /* Drum Sequencer Blocks */
        .drum-pad {
            width: 45px;
            height: 40px;
            background-color: #1e293b;
            border-bottom: 4px solid #475569;
            border-radius: 4px;
            cursor: pointer;
        }
        .drum-pad.kick-row { border-bottom-color: #ef4444; }
        .drum-pad.snare-row { border-bottom-color: #3b82f6; }
        .drum-pad.hihat-row { border-bottom-color: #eab308; }

        /* Shared Interactive Modifiers */
        .pad.active, .drum-pad.active {
            background-color: #00ffcc !important;
            box-shadow: 0 0 10px #00ffcc;
        }
        .pad.playing, .drum-pad.playing {
            filter: brightness(1.6);
            transform: scale(1.05);
        }

        /* Interactive Action Buttons */
        button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 0 #c92a2a;
            transition: all 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .btn-export {
            background: #059669;
            box-shadow: 0 4px 0 #047857;
        }
        .hacker-panel {
            font-family: 'Courier New', monospace;
            color: #38bdf8;
            margin-top: 15px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <h1>🎹 CHROMATIC LAB x FL STUDIO ULTIMATE DAWS v8.0 🥁</h1>
    <p class="subtitle">12-Tone Chromatic Matrix + FL Drums + Real Time BPM + WAV Exporter! 🚨🧃</p>

    <!-- CONTROL DASHBOARD -->
    <div class="dashboard">
        <button id="playBtn">START THE RAVE HARDCORE! 🚀</button>
        
        <div class="control-group">
            <label for="bpmSlider">⚡ TEMPO SPEED: <span id="bpmVal">120</span> BPM</label>
            <input type="range" id="bpmSlider" min="60" max="240" value="120">
        </div>

        <div class="control-group">
            <label for="lengthSlider">📏 SONG LENGTH: <span id="lengthVal">16</span> STEPS</label>
            <input type="range" id="lengthSlider" min="4" max="32" value="16" step="4">
        </div>

        <button id="exportBtn" class="btn-export">EXPORT TRACK TO .WAV 💾</button>
    </div>

    <!-- WORKSPACE MATRIX SCROLL GRID -->
    <div class="workspace">
        <div class="section-title">🎵 12-TONE CHROMATIC CHROMIUM PIANO SCALE</div>
        <div class="grid-container" id="synthGrid"></div>

        <div class="section-title">🥁 FL STUDIO STEP DRUM SEQUENCER</div>
        <div class="grid-container" id="drumGrid"></div>
    </div>

    <div class="hacker-panel" id="statusLog">Status: Bytebeat engine initialized. Standing by... 📡</div>

    <script>
        // DOM Nodes Hooking
        const synthContainer = document.getElementById('synthGrid');
        const drumContainer = document.getElementById('drumGrid');
        const playBtn = document.getElementById('playBtn');
        const exportBtn = document.getElementById('exportBtn');
        const bpmSlider = document.getElementById('bpmSlider');
        const bpmVal = document.getElementById('bpmVal');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthVal = document.getElementById('lengthVal');
        const statusLog = document.getElementById('statusLog');

        let audioCtx = null;
        let isPlaying = false;
        let currentStep = 0;
        let nextTickTime = 0;
        let timerId = null;

        let bpm = 120;
        let totalSteps = 16;
        
        const CHROMATIC_ROWS = 12;
        const DRUM_ROWS = 3;

        // Perfect 12-Tone Chromatic Frequencies from C5 down to C4 🎹
        const FREQS = [
            523.25, // C5
            493.88, // B4
            466.16, // A#4
            440.00, // A4
            415.30, // G#4
            392.00, // G4
            369.99, // F#4
            349.23, // F4
            329.63, // E4
            311.13, // D#4
            293.66, // D4
            261.63  // C4
        ];

        // Storage Arrays Max Limits
        let synthState = Array(CHROMATIC_ROWS).fill().map(() => Array(32).fill(false));
        let drumState = Array(DRUM_ROWS).fill().map(() => Array(32).fill(false));
        
        let synthPads = [];
        let drumPads = [];

        // 🧱 DYNAMICALLY DRAW GRIDS BASED ON DESIGNED SONG LENGTH
        function renderGrids() {
            synthContainer.innerHTML = '';
            drumContainer.innerHTML = '';
            synthContainer.style.gridTemplateColumns = `repeat(${totalSteps}, 45px)`;
            drumContainer.style.gridTemplateColumns = `repeat(${totalSteps}, 45px)`;

            // Render Chromatic Grid
            for (let r = 0; r < CHROMATIC_ROWS; r++) {
                synthPads[r] = [];
                for (let c = 0; c < totalSteps; c++) {
                    const pad = document.createElement('div');
                    pad.classList.add('pad', `note-${r}`);
                    if (synthState[r][c]) pad.classList.add('active');
                    
                    pad.addEventListener('click', () => {
                        synthState[r][c] = !synthState[r][c];
                        pad.classList.toggle('active');
                        if (synthState[r][c] && audioCtx) playSynthTone(FREQS[r], audioCtx.currentTime, audioCtx);
                    });
                    synthContainer.appendChild(pad);
                    synthPads[r][c] = pad;
                }
            }

            // Render FL Drum Sequencer
            const drumClasses = ['kick-row', 'snare-row', 'hihat-row'];
            for (let r = 0; r < DRUM_ROWS; r++) {
                drumPads[r] = [];
                for (let c = 0; c < totalSteps; c++) {
                    const pad = document.createElement('div');
                    pad.classList.add('drum-pad', drumClasses[r]);
                    if (drumState[r][c]) pad.classList.add('active');
                    
                    pad.addEventListener('click', () => {
                        drumState[r][c] = !drumState[r][c];
                        pad.classList.toggle('active');
                        if (drumState[r][c] && audioCtx) triggerDrumSound(r, audioCtx.currentTime, audioCtx);
                    });
                    drumContainer.appendChild(pad);
                    drumPads[r][c] = pad;
                }
            }
        }

        // 🔊 NATIVE REPLICATED RETRO TRIANGLE SYNTH CONTEXT INSTRUMENT
        function playSynthTone(freq, time, ctx) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, time);
            gain.gain.setValueAtTime(0.15, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(time);
            osc.stop(time + 0.3);
        }

        // 🥁 FL STUDIO 808 SYNTH DRUM EMULATORS
        function triggerDrumSound(rowType, time, ctx) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);

            if (rowType === 0) { // Deep Punchy 808 Kick
                osc.frequency.setValueAtTime(140, time);
                osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.12);
                gain.gain.setValueAtTime(0.5, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
                osc.start(time);
                osc.stop(time + 0.15);
            } 
            else if (rowType === 1) { // Crunchy Snare Snap
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(170, time);
                gain.gain.setValueAtTime(0.25, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                osc.start(time);
                osc.stop(time + 0.1);

                // Quick programmatic algorithmic noise snare tail
                const bufferSize = ctx.sampleRate * 0.08;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.15, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.08);
                noise.connect(noiseGain);
                noiseGain.connect(ctx.destination);
                noise.start(time);
                noise.stop(time + 0.08);
            } 
            else if (rowType === 2) { // Square Synth Hi-Hat Click
                osc.type = 'square';
                osc.frequency.setValueAtTime(9000, time);
                gain.gain.setValueAtTime(0.08, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
                osc.start(time);
                osc.stop(time + 0.04);
            }
        }

        // 🏎️ SCHEDULER CLOCK ENGINE (Web Audio API Rock Solid Precision)
        function scheduler() {
            while (nextTickTime < audioCtx.currentTime + 0.1) {
                scheduleStep(currentStep, nextTickTime);
                advanceStep();
            }
            timerId = setTimeout(scheduler, 25);
        }

        function scheduleStep(step, time) {
            // Visual playhead flashing callback using requestAnimationFrame
            ctxTimeCallback(step, time);

            for (let r = 0; r < CHROMATIC_ROWS; r++) {
                if (synthState[r][step]) playSynthTone(FREQS[r], time, audioCtx);
            }
            for (let r = 0; r < DRUM_ROWS; r++) {
                if (drumState[r][step]) triggerDrumSound(r, time, audioCtx);
            }
        }

        function advanceStep() {
            const secondsPerBeat = 60.0 / bpm / 2; // Step speed calculation (Eighth Notes)
            nextTickTime += secondsPerBeat;
            currentStep = (currentStep + 1) % totalSteps;
        }

        function ctxTimeCallback(step, time) {
            const delay = Math.max(0, (time - audioCtx.currentTime) * 1000);
            setTimeout(() => {
                if (!isPlaying) return;
                let prevStep = (step + totalSteps - 1) % totalSteps;
                
                // Clear out highlight lines
                for(let r=0; r<CHROMATIC_ROWS; r++) if(synthPads[r][prevStep]) synthPads[r][prevStep].classList.remove('playing');
                for(let r=0; r<DRUM_ROWS; r++) if(drumPads[r][prevStep]) drumPads[r][prevStep].classList.remove('playing');

                // Add active playhead highlight colors
                for(let r=0; r<CHROMATIC_ROWS; r++) if(synthPads[r][step]) synthPads[r][step].classList.add('playing');
                for(let r=0; r<DRUM_ROWS; r++) if(drumPads[r][step]) drumPads[r][step].classList.add('playing');
            }, delay);
        }

        // 🎛️ PLAY INTERRUPT BUTTON
        playBtn.addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            if (isPlaying) {
                clearTimeout(timerId);
                isPlaying = false;
                playBtn.innerText = "START THE RAVE HARDCORE! 🚀";
                statusLog.innerText = "Status: Rave paused. Wafers crisp. 🍪";
            } else {
                currentStep = 0;
                nextTickTime = audioCtx.currentTime;
                isPlaying = true;
                scheduler();
                playBtn.innerText = "FREEZE THE TIMELINE 🛑";
                statusLog.innerText = "Status: Playing live matrix array composition! 🔥🍉";
            }
        });

        // 🎚️ CONTROL VALUE MODIFIER listeners
        bpmSlider.addEventListener('input', (e) => {
            bpm = parseInt(e.target.value);
            bpmVal.innerText = bpm;
        });

        lengthSlider.addEventListener('input', (e) => {
            totalSteps = parseInt(e.target.value);
            lengthVal.innerText = totalSteps;
            renderGrids();
        });

        // ==========================================
        // 💾 THE NATIVE OFFLINE WAV EXPORTER ENGINE (.WAV GENERATOR)
        // ==========================================
        exportBtn.addEventListener('click', () => {
            statusLog.innerText = "Status: Initializing Offline Context Render... 🧠";
            
            const secondsPerBeat = 60.0 / bpm / 2;
            const totalDuration = totalSteps * secondsPerBeat + 0.5; // Added safety ringout buffer tail
            const sampleRate = 44100;
            
            // Create target buffer setup
            const offlineCtx = new OfflineAudioContext(1, sampleRate * totalDuration, sampleRate);

            // Execute note layouts straight down to offline timeline context
            for (let step = 0; step < totalSteps; step++) {
                let stepTime = step * secondsPerBeat;
                for (let r = 0; r < CHROMATIC_ROWS; r++) {
                    if (synthState[r][step]) playSynthTone(FREQS[r], stepTime, offlineCtx);
                }
                for (let r = 0; r < DRUM_ROWS; r++) {
                    if (drumState[r][step]) triggerDrumSound(r, stepTime, offlineCtx);
                }
            }

            statusLog.innerText = "Status: Baking matrix components down into audio channels... 🍳";

            offlineCtx.startRendering().then(renderedBuffer => {
                const wavBlob = bufferToWav(renderedBuffer);
                const url = URL.createObjectURL(wavBlob);
                
                // Fire download injection instantly!
                const a = document.createElement('a');
                a.href = url;
                a.download = `gamer_sandwich_beatbox_${bpm}bpm.wav`;
                a.click();
                
                statusLog.innerText = "Status: WAV file generated and dispatched successfully! 👍🤩😎";
            }).catch(err => {
                statusLog.innerText = `Error compiling file: ${err}`;
            });
        });

        // 🛠️ RIFF WAV STRUCT PACKING SYSTEM FOR AUDIO STREAM BINARIES
        function bufferToWav(buffer) {
            let numOfChan = buffer.numberOfChannels,
                length = buffer.length * numOfChan * 2 + 44,
                bufferArr = new ArrayBuffer(length),
                view = new DataView(bufferArr),
                channels = [], i, sample,
                offset = 0,
                pos = 0;

            // Write wave header identifiers
            setUint32(0x46464952);                         // "RIFF" chunk descriptor
            setUint32(length - 8);                         // File scale block length
            setUint32(0x45564157);                         // "WAVE" structural format identifier
            setUint32(0x20746d66);                         // "fmt " subchunk chunk
            setUint32(16);                                 // Subchunk format length size
            setUint16(1);                                  // Audio PCM modulation index type (1 = Uncompressed)
            setUint16(numOfChan);
            setUint32(buffer.sampleRate);
            setUint32(buffer.sampleRate * 2 * numOfChan);  // Byte rate tracking computation
            setUint16(numOfChan * 2);                      // Block alignments
            setUint16(16);                                 // Bits per sample size index
            setUint32(0x61746164);                         // "data" structural subchunk marking identifier
            setUint32(length - pos - 4);                   // Data chunk allocation boundaries

            // Merge stereo layers down to raw interleaved arrays
            for (i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

            while (pos < length) {
                for (i = 0; i < numOfChan; i++) {             // Interleave audio channel frames
                    sample = Math.max(-1, Math.min(1, channels[i][offset])); // Hard brickwall limiter protection clip
                    sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF; // Translate directly to 16-bit Integer ranges
                    view.setInt16(pos, sample, true);
                    pos += 2;
                }
                offset++;
            }

            return new Blob([bufferArr], { type: 'audio/wav' });

            function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
            function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
        }

        // Initialize setup compilation
        renderGrids();
    </script>
</body>
</html>
