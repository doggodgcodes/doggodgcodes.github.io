<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🎹 CHROME LAB x FL STUDIO MATRIX 🥁</title>
    <style>
        body {
            background: linear-gradient(180deg, #0f172a, #1e1b4b);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #00FFCC;
            text-shadow: 3px 3px 0px #FF0066;
            font-size: 2.5rem;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #ffb703;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 15px 0 5px 0;
            color: #a5b4fc;
        }
        /* Grid Arrangements */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(8, 55px);
            gap: 6px;
            justify-content: center;
            background: rgba(15, 23, 42, 0.6);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #334155;
            width: fit-content;
            margin: 0 auto 20px auto;
        }
        .pad {
            width: 55px;
            height: 40px;
            background-color: #334155;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.05s ease, background-color 0.1s ease;
        }
        /* Chrome Music Lab Inspired Pastel Rainbow Row Colors */
        .pad.row-0 { border-left: 5px solid #ff4d6d; }
        .pad.row-1 { border-left: 5px solid #ff758f; }
        .pad.row-2 { border-left: 5px solid #ff97b7; }
        .pad.row-3 { border-left: 5px solid #ffb3c6; }
        .pad.row-4 { border-left: 5px solid #90e0ef; }
        .pad.row-5 { border-left: 5px solid #00b4d8; }
        .pad.row-6 { border-left: 5px solid #0077b6; }
        .pad.row-7 { border-left: 5px solid #03045e; }

        /* Drum Sequencer Styling */
        .drum-container {
            display: grid;
            grid-template-columns: repeat(8, 55px);
            gap: 6px;
            justify-content: center;
            background: rgba(30, 41, 59, 0.8);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #ffaa00;
            width: fit-content;
            margin: 0 auto 25px auto;
        }
        .drum-pad {
            width: 55px;
            height: 45px;
            background-color: #1e293b;
            border: 2px solid #475569;
            border-radius: 6px;
            cursor: pointer;
        }
        .drum-pad.kick-row { border-bottom: 4px solid #ef4444; }
        .drum-pad.snare-row { border-bottom: 4px solid #3b82f6; }
        .drum-pad.hihat-row { border-bottom: 4px solid #eab308; }

        /* Shared Interactive Classes */
        .pad.active, .drum-pad.active {
            background-color: #00ffcc !important;
            box-shadow: 0 0 12px #00ffcc;
        }
        .pad.playing, .drum-pad.playing {
            filter: brightness(1.6);
            transform: scale(1.05);
        }

        /* Dashboard Interface Controls */
        .controls {
            margin: 20px 0;
        }
        button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 0 #c92a2a;
            transition: all 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .hacker-panel {
            font-family: 'Courier New', monospace;
            color: #38bdf8;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>🎹 CHROME LAB x FL STUDIO MATRIX 🥁</h1>
    <p class="subtitle">Draw your melody notes on top, layout your drum kicks and snares below! 🚀🍕</p>

    <div class="section-title">🎵 CHROMATIC SYNTH MAKER (Chrome Lab Style)</div>
    <div class="grid-container" id="synthGrid"></div>

    <div class="section-title">🥁 FL STUDIO STEP SEQUENCER (KICK, SNARE, HI-HAT)</div>
    <div class="drum-container" id="drumGrid"></div>

    <div class="controls">
        <button id="playBtn">LAUNCH THE BEAT INVASION ⚡</button>
    </div>

    <div class="hacker-panel" id="statusLog">Status: Synthesizers primed. Ready to boogie woogie... 🧠</div>

    <script>
        const synthContainer = document.getElementById('synthGrid');
        const drumContainer = document.getElementById('drumGrid');
        const playBtn = document.getElementById('playBtn');
        const statusLog = document.getElementById('statusLog');

        let audioCtx = null;
        let isPlaying = false;
        let currentStep = 0;
        let loopInterval = null;

        const STEPS = 8;
        const SYNTH_ROWS = 8; // 8 pitch levels
        const DRUM_ROWS = 3;  // Kick, Snare, Hi-hat

        // Pentatonic/Chromatic Fusion Scale Notes (Higher to Lower)
        const FREQS = [523.25, 493.88, 440.00, 392.00, 349.23, 329.63, 293.66, 261.63]; 

        // Storage Matrix States
        const synthState = Array(SYNTH_ROWS).fill().map(() => Array(STEPS).fill(false));
        const drumState = Array(DRUM_ROWS).fill().map(() => Array(STEPS).fill(false));

        const synthPads = [];
        const drumPads = [];

        // 🛠️ GENERATE CHROME MUSIC LAB MELODY GRID
        for (let r = 0; r < SYNTH_ROWS; r++) {
            synthPads[r] = [];
            for (let c = 0; c < STEPS; c++) {
                const pad = document.createElement('div');
                pad.classList.add('pad', `row-${r}`);
                pad.addEventListener('click', () => {
                    synthState[r][c] = !synthState[r][c];
                    pad.classList.toggle('active');
                    if(synthState[r][c]) playSynthTone(FREQS[r]);
                });
                synthContainer.appendChild(pad);
                synthPads[r][c] = pad;
            }
        }

        // 🛠️ GENERATE FL STUDIO DRUM TRACKS
        const drumRowClasses = ['kick-row', 'snare-row', 'hihat-row'];
        for (let r = 0; r < DRUM_ROWS; r++) {
            drumPads[r] = [];
            for (let c = 0; c < STEPS; c++) {
                const pad = document.createElement('div');
                pad.classList.add('drum-pad', drumRowClasses[r]);
                pad.addEventListener('click', () => {
                    drumState[r][c] = !drumState[r][c];
                    pad.classList.toggle('active');
                    if(drumState[r][c]) triggerDrumSound(r);
                });
                drumContainer.appendChild(pad);
                drumPads[r][c] = pad;
            }
        }

        // 🔊 INSTRUMENT SOURCE: NATIVE CHROMATIC TRIANGLE WAVE
        function playSynthTone(freq) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle'; // Chrome Music Lab default instrument emulation vibe
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.35);
        }

        // 🥁 NATIVE WEB AUDIO DRUM SYNTHESIZERS (NO AUDIO FILES REQUIRED!)
        function triggerDrumSound(rowType) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (rowType === 0) { // 🚨 DEEP TRAP 808 KICK
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.15);
                gain.gain.setValueAtTime(0.6, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } 
            else if (rowType === 1) { // 💥 CRISPY FL STUDIO SNARE
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(180, now);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                
                // Noise injection clone for the snare snap
                const bufferSize = audioCtx.sampleRate * 0.1;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.2, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                noise.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                
                osc.start(now);
                osc.stop(now + 0.12);
                noise.start(now);
                noise.stop(now + 0.1);
            } 
            else if (rowType === 2) { // ⚡ METALLIC CHILL HI-HAT
                // High frequency burst emulation
                osc.type = 'square';
                osc.frequency.setValueAtTime(10000, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            }
        }

        // 🏎️ CENTRAL CLOCK SEQUENCER STEPPERS
        function playEngineLoop() {
            let prevStep = (currentStep + STEPS - 1) % STEPS;

            // Remove previous marker classes
            for (let r = 0; r < SYNTH_ROWS; r++) synthPads[r][prevStep].classList.remove('playing');
            for (let r = 0; r < DRUM_ROWS; r++) drumPads[r][prevStep].classList.remove('playing');

            // Inject playhead position animations
            for (let r = 0; r < SYNTH_ROWS; r++) {
                synthPads[r][currentStep].classList.add('playing');
                if (synthState[r][currentStep]) playSynthTone(FREQS[r]);
            }
            for (let r = 0; r < DRUM_ROWS; r++) {
                drumPads[r][currentStep].classList.add('playing');
                if (drumState[r][currentStep]) triggerDrumSound(r);
            }

            currentStep = (currentStep + 1) % STEPS;
        }

        // 🎛️ PLAY/PAUSE ROUTINE INTERRUPT
        playBtn.addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            if (isPlaying) {
                clearInterval(loopInterval);
                isPlaying = false;
                playBtn.innerText = "LAUNCH THE BEAT INVASION ⚡";
                statusLog.innerText = "Status: Track frozen. Engine cooling down... 🍔";
            } else {
                currentStep = 0;
                loopInterval = setInterval(playEngineLoop, 140); // Fast pacing electronic bounce!
                isPlaying = true;
                playBtn.innerText = "FREEZE THE TIMELINE 🛑";
                statusLog.innerText = "Status: PLAYING COMPOSITION! Bytebeats are cooking hard! 🔥🍉";
            }
        });
    </script>
</body>
</html>
