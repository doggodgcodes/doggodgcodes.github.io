<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🎹 CHROMATIC MATRIX INTERACTIVE STATION v11.0 🥁</title>
    <style>
        body {
            background: linear-gradient(135deg, #020617, #1e1b4b, #311042);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #00FFCC;
            text-shadow: 4px 4px 0px #FF0066;
            font-size: 2.8rem;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #ffb703;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }
        /* HACKER PANEL PROMOTED TO THE APEX */
        .hacker-panel {
            font-family: 'Courier New', monospace;
            color: #38bdf8;
            background: rgba(0, 0, 0, 0.7);
            padding: 14px;
            border-radius: 8px;
            border: 2px dashed #00FFCC;
            max-width: 950px;
            margin: 0 auto 20px auto;
            font-size: 1.1rem;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
        /* Dashboard Control Center */
        .dashboard {
            background: rgba(15, 23, 42, 0.85);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #38bdf8;
            max-width: 950px;
            margin: 0 auto 20px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
            color: #cbd5e1;
        }
        .control-group input, .control-group select {
            margin-top: 8px;
            padding: 5px 10px;
            background: #1e293b;
            color: #00FFCC;
            border: 2px solid #38bdf8;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        /* Workspace Matrix */
        .workspace {
            overflow-x: auto;
            max-width: 95vw;
            margin: 0 auto;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
        }
        .section-title {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0 10px 0;
            color: #a5b4fc;
        }
        .grid-container {
            display: grid;
            gap: 4px;
            justify-content: start;
            width: fit-content;
            margin: 0 auto;
            padding: 10px;
        }
        .pad {
            width: 45px;
            height: 32px;
            background-color: #334155;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.05s ease;
        }
        /* Chromatic Note Colors */
        .pad.note-0 { border-left: 4px solid #ff595e; }
        .pad.note-1 { border-left: 4px solid #ff924c; }
        .pad.note-2 { border-left: 4px solid #ffca3a; }
        .pad.note-3 { border-left: 4px solid #c5ca30; }
        .pad.note-4 { border-left: 4px solid #8ac926; }
        .pad.note-5 { border-left: 4px solid #52b788; }
        .pad.note-6 { border-left: 4px solid #1982c4; }
        .pad.note-7 { border-left: 4px solid #4267b2; }
        .pad.note-8 { border-left: 4px solid #6a4c93; }
        .pad.note-9 { border-left: 4px solid #b5179e; }
        .pad.note-10 { border-left: 4px solid #7209b7; }
        .pad.note-11 { border-left: 4px solid #f72585; }

        .drum-pad {
            width: 45px;
            height: 40px;
            background-color: #1e293b;
            border-bottom: 4px solid #475569;
            border-radius: 4px;
            cursor: pointer;
        }
        .drum-pad.kick-row { border-bottom-color: #ef4444; }
        .drum-pad.snare-row { border-bottom-color: #3b82f6; }
        .drum-pad.hihat-row { border-bottom-color: #eab308; }

        .pad.active, .drum-pad.active {
            background-color: #00ffcc !important;
            box-shadow: 0 0 10px #00ffcc;
        }
        .pad.playing, .drum-pad.playing {
            filter: brightness(1.6);
            transform: scale(1.05);
        }

        /* Action Buttons */
        button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 22px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 0 #c92a2a;
            transition: all 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .btn-export { background: #059669; box-shadow: 0 4px 0 #047857; }
        .btn-save { background: #3b82f6; box-shadow: 0 4px 0 #1d4ed8; }
        .btn-load { background: #8b5cf6; box-shadow: 0 4px 0 #6d28d9; position: relative; display: inline-block; }
        #fileInput { display: none; }
    </style>
</head>
<body>

    <h1>🎹 CHROMATIC MATRIX INTERACTIVE STATION v11.0 🥁</h1>
    <p class="subtitle">Stack Overflow Safe-Saving Architecture + Promoted Hacker Deck</p>

    <!-- HACKER PANEL AT THE ABSOLUTE TOP -->
    <div class="hacker-panel" id="statusLog">📡 SYSTEM INITIALIZED: Stack Overflow link-injected save protocols loaded into browser RAM. Ready to jam!</div>

    <!-- CONTROL DASHBOARD -->
    <div class="dashboard">
        <button id="playBtn">START THE RAVE HARDCORE! 🚀</button>
        
        <div class="control-group">
            <label for="waveType">🎻 INSTRUMENT SELECT</label>
            <select id="waveType">
                <option value="triangle" selected>Retro Triangle (Default)</option>
                <option value="square">8-Bit Square Burst</option>
                <option value="sine">Smooth Acoustic Sine</option>
            </select>
        </div>

        <div class="control-group">
            <label for="bpmSlider">⚡ TEMPO SPEED: <span id="bpmVal">120</span> BPM</label>
            <input range id="bpmSlider" type="range" min="60" max="240" value="120">
        </div>

        <div class="control-group">
            <label for="lengthSlider">📏 MATRIX LENGTH: <span id="lengthVal">16</span> STEPS</label>
            <input range id="lengthSlider" type="range" min="4" max="32" value="16" step="4">
        </div>

        <button id="exportBtn" class="btn-export">EXPORT TO .WAV 💾</button>
        <button id="saveBtn" class="btn-save">SAVE PROJECT 📁</button>
        
        <label class="btn-load" style="padding: 12px 22px; font-weight: bold; border-radius: 25px; cursor: pointer;">
            LOAD PROJECT 📂
            <input type="file" id="fileInput" accept=".🔊🎧">
        </label>
    </div>

    <!-- WORKSPACE -->
    <div class="workspace">
        <div class="section-title">🎵 12-TONE CHROMATIC PITCH MATRIX</div>
        <div class="grid-container" id="synthGrid"></div>

        <div class="section-title">🥁 COMPACT STEP SEQUENCER DRUM RACK</div>
        <div class="grid-container" id="drumGrid"></div>
    </div>

    <script>
        const synthContainer = document.getElementById('synthGrid');
        const drumContainer = document.getElementById('drumGrid');
        const playBtn = document.getElementById('playBtn');
        const exportBtn = document.getElementById('exportBtn');
        const saveBtn = document.getElementById('saveBtn');
        const fileInput = document.getElementById('fileInput');
        const bpmSlider = document.getElementById('bpmSlider');
        const bpmVal = document.getElementById('bpmVal');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthVal = document.getElementById('lengthVal');
        const waveTypeSelect = document.getElementById('waveType');
        const statusLog = document.getElementById('statusLog');

        let audioCtx = null;
        let isPlaying = false;
        let currentStep = 0;
        let nextTickTime = 0;
        let timerId = null;

        let bpm = 120;
        let totalSteps = 16;
        let chosenWave = 'triangle';
        
        const CHROMATIC_ROWS = 12;
        const DRUM_ROWS = 3;
        const FREQS = [523.25, 493.88, 466.16, 440.00, 415.30, 392.00, 369.99, 349.23, 329.63, 311.13, 293.66, 261.63];

        let synthState = Array(CHROMATIC_ROWS).fill().map(() => Array(32).fill(false));
        let drumState = Array(DRUM_ROWS).fill().map(() => Array(32).fill(false));
        
        let synthPads = [];
        let drumPads = [];

        function renderGrids() {
            synthContainer.innerHTML = '';
            drumContainer.innerHTML = '';
            synthContainer.style.gridTemplateColumns = `repeat(${totalSteps}, 45px)`;
            drumContainer.style.gridTemplateColumns = `repeat(${totalSteps}, 45px)`;

            for (let r = 0; r < CHROMATIC_ROWS; r++) {
                synthPads[r] = [];
                for (let c = 0; c < totalSteps; c++) {
                    const pad = document.createElement('div');
                    pad.classList.add('pad', `note-${r}`);
                    if (synthState[r][c]) pad.classList.add('active');
                    
                    pad.addEventListener('click', () => {
                        synthState[r][c] = !synthState[r][c];
                        pad.classList.toggle('active');
                        if (synthState[r][c] && audioCtx) playSynthTone(FREQS[r], audioCtx.currentTime, audioCtx);
                    });
                    synthContainer.appendChild(pad);
                    synthPads[r][c] = pad;
                }
            }

            const drumClasses = ['kick-row', 'snare-row', 'hihat-row'];
            for (let r = 0; r < DRUM_ROWS; r++) {
                drumPads[r] = [];
                for (let c = 0; c < totalSteps; c++) {
                    const pad = document.createElement('div');
                    pad.classList.add('drum-pad', drumClasses[r]);
                    if (drumState[r][c]) pad.classList.add('active');
                    
                    pad.addEventListener('click', () => {
                        drumState[r][c] = !drumState[r][c];
                        pad.classList.toggle('active');
                        if (drumState[r][c] && audioCtx) triggerDrumSound(r, audioCtx.currentTime, audioCtx);
                    });
                    drumContainer.appendChild(pad);
                    drumPads[r][c] = pad;
                }
            }
        }

        function playSynthTone(freq, time, ctx) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = chosenWave;
            osc.frequency.setValueAtTime(freq, time);
            gain.gain.setValueAtTime(0.15, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(time);
            osc.stop(time + 0.3);
        }

        function triggerDrumSound(rowType, time, ctx) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);

            if (rowType === 0) { // Kick
                osc.frequency.setValueAtTime(140, time);
                osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.12);
                gain.gain.setValueAtTime(0.5, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
                osc.start(time);
                osc.stop(time + 0.15);
            } 
            else if (rowType === 1) { // Snare
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(170, time);
                gain.gain.setValueAtTime(0.25, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                osc.start(time);
                osc.stop(time + 0.1);

                const bufferSize = ctx.sampleRate * 0.08;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                const noiseGain = ctx.createGain();
                noiseGain.gain.setValueAtTime(0.15, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.08);
                noise.connect(noiseGain);
                noiseGain.connect(ctx.destination);
                noise.start(time);
                noise.stop(time + 0.08);
            } 
            else if (rowType === 2) { // Hi-Hat
                osc.type = 'square';
                osc.frequency.setValueAtTime(9000, time);
                gain.gain.setValueAtTime(0.08, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
                osc.start(time);
                osc.stop(time + 0.04);
            }
        }

        function scheduler() {
            while (nextTickTime < audioCtx.currentTime + 0.1) {
                scheduleStep(currentStep, nextTickTime);
                advanceStep();
            }
            timerId = setTimeout(scheduler, 25);
        }

        function scheduleStep(step, time) {
            ctxTimeCallback(step, time);
            for (let r = 0; r < CHROMATIC_ROWS; r++) {
                if (synthState[r][step]) playSynthTone(FREQS[r], time, audioCtx);
            }
            for (let r = 0; r < DRUM_ROWS; r++) {
                if (drumState[r][step]) triggerDrumSound(r, time, audioCtx);
            }
        }

        function advanceStep() {
            const secondsPerBeat = 60.0 / bpm / 2;
            nextTickTime += secondsPerBeat;
            currentStep = (currentStep + 1) % totalSteps;
        }

        function ctxTimeCallback(step, time) {
            const delay = Math.max(0, (time - audioCtx.currentTime) * 1000);
            setTimeout(() => {
                if (!isPlaying) return;
                let prevStep = (step + totalSteps - 1) % totalSteps;
                for(let r=0; r<CHROMATIC_ROWS; r++) if(synthPads[r][prevStep]) synthPads[r][prevStep].classList.remove('playing');
                for(let r=0; r<DRUM_ROWS; r++) if(drumPads[r][prevStep]) drumPads[r][prevStep].classList.remove('playing');
                for(let r=0; r<CHROMATIC_ROWS; r++) if(synthPads[r][step]) synthPads[r][step].classList.add('playing');
                for(let r=0; r<DRUM_ROWS; r++) if(drumPads[r][step]) drumPads[r][step].classList.add('playing');
            }, delay);
        }

        // ========================================================
        // 🛠️ STACK OVERFLOW FIXED ANCHOR BLOB DOWNLOAD INJECTION 
        // ========================================================
        function stackOverflowSaveMechanism(blob, filename) {
            // Replaced old redirection methods with verified DOM injection pipeline
            const URL_Engine = window.URL || window.webkitURL;
            const downloadUrl = URL_Engine.createObjectURL(blob);
            
            const anchorElement = document.createElement('a');
            anchorElement.style.display = 'none';
            anchorElement.href = downloadUrl;
            anchorElement.download = filename;
            
            // Append directly to body to bypass iframe and security tier tracking blocks
            document.body.appendChild(anchorElement);
            anchorElement.click();
            
            // Cleanup memory thread immediately after execution loop
            setTimeout(() => {
                document.body.removeChild(anchorElement);
                URL_Engine.revokeObjectURL(downloadUrl);
            }, 150);
        }

        playBtn.addEventListener('click', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (isPlaying) {
                clearTimeout(timerId);
                isPlaying = false;
                playBtn.innerText = "START THE RAVE HARDCORE! 🚀";
                statusLog.innerText = "Status: Rave paused. Wafers crisp. 🍪";
            } else {
                currentStep = 0;
                nextTickTime = audioCtx.currentTime;
                isPlaying = true;
                scheduler();
                playBtn.innerText = "FREEZE THE TIMELINE 🛑";
                statusLog.innerText = "Status: Playing live matrix array composition! 🔥🍉";
            }
        });

        bpmSlider.addEventListener('input', (e) => {
            bpm = parseInt(e.target.value);
            bpmVal.innerText = bpm;
        });

        lengthSlider.addEventListener('input', (e) => {
            totalSteps = parseInt(e.target.value);
            lengthVal.innerText = totalSteps;
            renderGrids();
        });

        waveTypeSelect.addEventListener('change', (e) => {
            chosenWave = e.target.value;
            statusLog.innerText = `Status: Instrument shifted to ${chosenWave}!`;
        });

        // ==========================================
        // 📁 PROJECT FILE SAVE WORKER (.🔊🎧)
        // ==========================================
        saveBtn.addEventListener('click', () => {
            const projectData = {
                version: "11.0",
                bpm: bpm,
                totalSteps: totalSteps,
                chosenWave: chosenWave,
                synthState: synthState,
                drumState: drumState
            };
            const dataString = JSON.stringify(projectData);
            const blob = new Blob([dataString], { type: 'application/json' });
            
            // Trigger customized Stack Overflow verified download
            stackOverflowSaveMechanism(blob, `matrix_session.🔊🎧`);
            statusLog.innerText = "Status: Saved project configuration (.🔊🎧) through Stack Overflow DOM routing pipeline! 👍";
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = JSON.parse(event.target.result);
                    bpm = data.bpm;
                    totalSteps = data.totalSteps;
                    chosenWave = data.chosenWave;
                    synthState = data.synthState;
                    drumState = data.drumState;

                    bpmSlider.value = bpm;
                    bpmVal.innerText = bpm;
                    lengthSlider.value = totalSteps;
                    lengthVal.innerText = totalSteps;
                    waveTypeSelect.value = chosenWave;

                    renderGrids();
                    statusLog.innerText = "Status: Matrix arrays imported successfully! 🎧🛸";
                } catch (err) {
                    statusLog.innerText = "Error tracking file data configuration!";
                }
            };
            reader.readAsText(file);
        });

        // ==========================================
        // 🔊 COMPILER WAV EXPORTER WORKER
        // ==========================================
        exportBtn.addEventListener('click', () => {
            statusLog.innerText = "Status: Booting offline tracing matrix... 🧠";
            
            const secondsPerBeat = 60.0 / bpm / 2;
            const totalDuration = totalSteps * secondsPerBeat + 0.5;
            const sampleRate = 44100;
            
            // Replaced outdated constructors with full OfflineAudioContext allocation
            const offlineCtx = new OfflineAudioContext(1, sampleRate * totalDuration, sampleRate);

            for (let step = 0; step < totalSteps; step++) {
                let stepTime = step * secondsPerBeat;
                for (let r = 0; r < CHROMATIC_ROWS; r++) {
                    if (synthState[r][step]) playSynthTone(FREQS[r], stepTime, offlineCtx);
                }
                for (let r = 0; r < DRUM_ROWS; r++) {
                    if (drumState[r][step]) triggerDrumSound(r, stepTime, offlineCtx);
                }
            }

            statusLog.innerText = "Status: Compiling audio frames into binary segments... 🍳";

            offlineCtx.startRendering().then(renderedBuffer => {
                const wavBlob = bufferToWav(renderedBuffer);
                // Trigger customized Stack Overflow verified download
                stackOverflowSaveMechanism(wavBlob, `matrix_track_${bpm}bpm.wav`);
                statusLog.innerText = "Status: WAV file generated and downloaded cleanly! 👍🤩😎";
            }).catch(err => {
                statusLog.innerText = `Render Fault: ${err}`;
            });
        });

        function bufferToWav(buffer) {
            let numOfChan = buffer.numberOfChannels,
                length = buffer.length * numOfChan * 2 + 44,
                bufferArr = new ArrayBuffer(length),
                view = new DataView(bufferArr),
                channels = [], i, sample,
                offset = 0,
                pos = 0;

            setUint32(0x46464952); // "RIFF"
            setUint32(length - 8); 
            setUint32(0x45564157); // "WAVE"
            setUint32(0x20746d66); // "fmt "
            setUint32(16); 
            setUint16(1); 
            setUint16(numOfChan);
            setUint32(buffer.sampleRate);
            setUint32(buffer.sampleRate * 2 * numOfChan);
            setUint16(numOfChan * 2); 
            setUint16(16); 
            setUint32(0x61746164); // "data"
            setUint32(length - pos - 4);

            for (i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

            while (pos < length) {
                for (i = 0; i < numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset])); 
                    sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF; 
                    view.setInt16(pos, sample, true);
                    pos += 2;
                }
                offset++;
            }

            return new Blob([bufferArr], { type: 'audio/wav' });

            function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
            function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
        }

        renderGrids();
    </script>
</body>
</html>
