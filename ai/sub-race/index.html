<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Sub Race (Simulation)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #080808; --card-bg: #121212; --accent: #00ff88;
            --hype: #ff00ff; --doggo-glow: #ffae00; --text-dim: #888;
        }

        body {
            background-color: var(--bg-dark); color: #fff;
            font-family: "Segoe UI", Roboto, sans-serif, "Noto Sans Lao";
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
        }

        .dashboard { width: 95%; max-width: 1300px; background: var(--card-bg); padding: 20px; border-radius: 24px; border: 1px solid #222; }

        .top-ui {
            background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 20px;
            position: sticky; top: 10px; z-index: 1000; border: 1px solid #333;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-item { background: #000; padding: 8px; border-radius: 8px; text-align: center; color: var(--accent); font-weight: 800; border: 1px solid #333; font-size: 0.9rem; }

        .chart-viewport { 
            width: 100%; height: 500px; overflow-y: auto; background: #0a0a0a; 
            border-radius: 12px; border: 1px solid #222; padding: 10px;
        }
        #chart-container { position: relative; width: 100%; }

        .channel-row { position: absolute; width: 100%; height: 32px; display: flex; align-items: center; transition: all 0.4s ease; }
        .bar-wrapper { height: 22px; display: flex; align-items: center; border-radius: 0 6px 6px 0; position: relative; transition: width 0.4s ease; min-width: 4px; }
        .avatar { width: 22px; height: 22px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; border: 1px solid #444; }
        .name-and-subs { position: absolute; left: 8px; font-size: 0.7rem; font-weight: 700; text-shadow: 1px 1px 2px black; white-space: nowrap; }

        /* LIVE FEED */
        .comment-section { margin-top: 25px; background: #000; border-radius: 15px; padding: 20px; border: 1px solid #333; }
        #comment-feed { height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .comment-entry { background: #111; padding: 10px; border-radius: 8px; border-left: 4px solid var(--accent); font-size: 0.85rem; }
        .doggo-msg { border-left-color: var(--doggo-glow); background: #221a00; }
        .fan-msg { border-left-color: #555; }

        .input-area { display: flex; gap: 10px; }
        input { background: #111; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; }
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 8px; padding: 10px 20px; background: var(--accent); }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; padding: 15px; background: #000; border-radius: 15px; margin-top: 15px; }
        .video-card { background: #161616; border-radius: 8px; overflow: hidden; border: 1px solid #333; font-size: 0.7rem; }
        .thumbnail img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="top-ui">
            <div class="stats-grid">
                <div class="stat-item">Network Subs: <span id="global-subs">0</span></div>
                <div class="stat-item">Hype Level: <span id="hype-level">STABLE</span></div>
                <div class="stat-item">Total Comments: <span id="global-comments">0</span></div>
            </div>
            <div style="display:flex; justify-content:center; gap:10px; align-items:center; flex-wrap: wrap;">
                <input type="text" id="newChannelName" placeholder="Add Creator...">
                <button onclick="addNewChannel()">DRAFT</button>
                <input type="range" id="speedSlider" min="50" max="1000" value="300" style="width:80px;">
                <button onclick="megaBoost()" style="background:#ff4444; color:#fff;">VIRAL SURGE ⚡</button>
            </div>
        </div>

        <div class="chart-viewport">
            <div id="chart-container"></div>
        </div>

        <div class="video-grid" id="videoGrid"></div>

        <div class="comment-section">
            <div style="color:var(--accent); font-weight: bold; margin-bottom: 10px; font-size: 0.8rem;">📡 LIVE GLOBAL CHAT</div>
            <div id="comment-feed"></div>
            <div class="input-area">
                <input type="text" id="userName" style="width:120px;" placeholder="Username">
                <input type="text" id="userMsg" style="flex-grow:1;" placeholder="Say something to the squad...">
                <button onclick="postUserComment()" style="background:var(--hype); color:white;">SEND</button>
            </div>
        </div>
    </div>

<script>
    const CORS_PROXY = "https://cors-anywhere.followalong.com/";
    const RSS_URL = "https://www.youtube.com/feeds/videos.xml?channel_id=UCzHeWI-gvnXPf7JpbRXCW_g";

    // UPDATED ROSTER
    const squadNames = [
        "DoggoWing21", "MineChicken98", "Tony-The-Pet-Ghost", "FlyingDogWithAPencil",
        "unsigned integer", "signed integer", "AI Chef", "The Troller", "Float32", "NullPointer",
        "Name 11", "Name 12", "Name 13", "Name 14", "Name 15", "Name 16", "Name 17", "Name 18", 
        "Name 19", "Name 20", "Name 21", "Name 22", "Name 23", "Name 24", "Name 25", "Name 26",
        "Name 27", "Name 28", "Name 29", "Name 30", "Name 31", "Name 32", "Name 33", "Name 34",
        "Name 35", "Name 36", "Name 37", "Name 38", "Name 39", "Name 40"
    ];

    let channels = squadNames.map((name, i) => ({
        id: 'ch-' + i,
        name: name,
        subs: 1000 - (i * 20),
        color: `hsl(${(i * 137.5) % 360}, 70%, 60%)`
    }));

    let boost = false;
    let globalCommentCount = 0;

    // COMMENT SYSTEM
    function addComment(author, text, type = 'fan') {
        const feed = document.getElementById('comment-feed');
        const div = document.createElement('div');
        div.className = `comment-entry ${type === 'doggo' ? 'doggo-msg' : 'fan-msg'}`;
        div.innerHTML = `<strong>${author}:</strong> ${text}`;
        feed.prepend(div);
        if(feed.children.length > 25) feed.lastChild.remove();
        globalCommentCount++;
        document.getElementById('global-comments').innerText = globalCommentCount;
    }

    function postUserComment() {
        const u = document.getElementById('userName').value || "Guest";
        const m = document.getElementById('userMsg').value;
        if(m.trim()) {
            addComment(u, m, 'user');
            document.getElementById('userMsg').value = "";
        }
    }

    // Auto-generate random fan comments
    const randomGiggles = ["Sub 2 MineChicken!", "Tony is actually a ghost??", "unsigned integer is popping off", "LFG Squad!!", "Doggo is the king", "W Sim", "Anyone else see that growth?"];
    setInterval(() => {
        if(Math.random() > 0.7) {
            const randAuthor = channels[Math.floor(Math.random() * channels.length)].name;
            const randMsg = randomGiggles[Math.floor(Math.random() * randomGiggles.length)];
            addComment(randAuthor, randMsg);
        }
    }, 4000);

    // GRAPH & CHANNEL LOGIC
    function addNewChannel() {
        const val = document.getElementById('newChannelName').value;
        if(val.trim()) {
            channels.push({ id: 'c-'+Date.now(), name: val, subs: 10, color: '#00ff88' });
            document.getElementById('newChannelName').value = "";
            addComment("System", `${val} has entered the arena!`);
        }
    }

    function render() {
        const container = document.getElementById('chart-container');
        container.style.height = `${channels.length * 35}px`;
        channels.sort((a, b) => b.subs - a.subs);
        
        const dIdx = channels.findIndex(c => c.name === "DoggoWing21");
        if(dIdx > 2) {
            const d = channels.splice(dIdx, 1)[0];
            channels.splice(0, 0, d);
            d.subs = channels[1].subs + 50;
        }

        let total = 0;
        const max = channels[0].subs || 1;

        channels.forEach((c, i) => {
            total += c.subs;
            let row = document.getElementById(`row-${c.id}`);
            if(!row) {
                row = document.createElement('div');
                row.id = `row-${c.id}`;
                row.className = 'channel-row';
                row.innerHTML = `<div class="avatar" style="background:${c.color}"></div><div class="bar-wrapper" id="bar-${c.id}"><div class="name-and-subs"><span>${c.name}</span><span id="sub-${c.id}"></span></div></div>`;
                container.appendChild(row);
            }
            row.style.top = `${i * 35}px`;
            const bar = document.getElementById(`bar-${c.id}`);
            bar.style.width = `${(c.subs/max)*85}%`;
            bar.style.backgroundColor = c.color;
            document.getElementById(`sub-${c.id}`).innerText = ` | ${Math.floor(c.subs).toLocaleString()}`;
            c.subs += (Math.random() * 12) * (boost ? 40 : 1);
        });

        document.getElementById('global-subs').innerText = Math.floor(total).toLocaleString();
        setTimeout(render, document.getElementById('speedSlider').value);
    }

    async function updateVideos() {
        try {
            const r = await fetch(CORS_PROXY + RSS_URL);
            const t = await r.text();
            const xml = new DOMParser().parseFromString(t, "text/xml");
            const entries = Array.from(xml.querySelectorAll("entry")).slice(0, 10);
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = "";
            entries.forEach(e => {
                const id = e.querySelector("videoId").textContent;
                const title = e.querySelector("title").textContent;
                const author = channels[Math.floor(Math.random() * 4)].name;
                grid.innerHTML += `<div class="video-card"><div class="thumbnail"><img src="https://i.ytimg.com/vi/${id}/hqdefault.jpg"></div><div style="padding:6px;"><strong>${title}</strong><br><span style="color:#888">${author}</span></div></div>`;
            });
        } catch(e) {}
    }

    function megaBoost() {
        boost = true;
        document.getElementById('hype-level').innerText = "VIRAL EXPLOSION!!";
        addComment("DoggoWing21", "EVERYONE LOOK AT THE GRAPH! 🚀🔥", 'doggo');
        setTimeout(() => {
            boost = false;
            document.getElementById('hype-level').innerText = "STABLE";
        }, 5000);
    }

    updateVideos();
    setInterval(updateVideos, 60000);
    render();
</script>
</body>
</html>
