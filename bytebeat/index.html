<!doctype html>
<html>
  <head>
    <title>Bytebeat - doggodgcodes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sass.js/0.9.12/sass.min.js"></script>
    <link rel="stylesheet" type="text/css" href="bytebeat.css">
    <style id="compiled-css"></style>
  </head>
  <body>
    <iframe src="https://dollchan.net/bytebeat/" style="width: 100%; height: 500px;"></iframe>
    <br>
    <hr>
    <br>
    <h1>Bytebeat Online</h1>
    <br>
    <hr>
    <br>
    <h1>Bytebeat Code</h1>
    <p>
      Sierpinski square? | (t&gt;&gt;40*9999/t&lt;&lt;42*7)
      <br>
      Kick | (t&gt;&gt;((t/2.14)/99))& 137
      <br>
      Fuller Kick | (t&gt;&gt;((t/2.14)/99)&lt;&lt;2) & 137
    </p>
    <script>
    fetch('style.scss')
      .then(response => response.text())
      .then(scss => {
        Sass.compile(scss, function(result) {
          const compiledCSS = result.text;
          document.getElementById('compiled-css').textContent = compiledCSS;
        });
      })
      .catch(error => console.error('Error fetching SCSS:', error));
    </script>
  </body>
</html>
