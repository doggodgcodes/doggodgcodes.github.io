@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Geist+Pixel&display=swap');
body {
  font-family: "DM Sans", sans-serif;
  background-color: navy;
  color: white;
}
      
  .game-grid {
    display: grid;
    /* This makes columns as many as can fit, at least 200px each */
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  .game-card {
    background: #e0f7fa; /* Frutiger Aero Vibe */
    border: 3px solid #00d4ff;
    border-radius: 15px;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .game-card:hover {
    transform: scale(1.02); /* Zoomy zoom! */
    border-color: #ffcc00; /* Cheeto-gold vibe */
  }

  .game-card img {
    width: 100%;
    height: 150px;
    object-fit: cover; /* Keeps it square and clean */
  }

  .game-title {
    padding: 10px;
    text-align: center;
    font-family: "Geist Pixel", "DM Sans", sans-serif;
    font-weight: bold;
    color: #333;
  }
      
.dm-sans {
  font-family: "DM Sans", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
}
      
.geist-pixel {
  font-family: "Geist Pixel", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
  font-variation-settings:
    "ELSH" 0;
}
</style>
