<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Cats Capsule Game</title>
    <!-- uses minechicken code credits to minechicken -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Luckiest Guy", cursive, sans-serif;
            background: linear-gradient(135deg, #FF6B9D 0%, #C06C84 50%, #6C5B7B 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            padding: 30px;
        }
        h1 {
            font-size: 2.5em;
            color: #FF6B9D;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .currency-display {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }
        .currency-display h2 {
            color: white;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .currency-display .amount {
            font-size: 3em;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
        }
        .capsule-machine {
            background: linear-gradient(135deg, #E94560, #C73659);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.4);
            position: relative;
        }
        .capsule-display {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto; /* For 100x roll */
        }
        .capsule-animation {
            font-size: 5em;
            animation: bounce 0.5s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .pull-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .pull-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-family: "Luckiest Guy", cursive;
        }
        .pull-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        .pull-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pull-1 { background: linear-gradient(135deg, #667eea, #764ba2); }
        .pull-10 { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .pull-11 { background: linear-gradient(135deg, #FFD700, #FF8C00); }

        .inventory {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
        }
        .cats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        .cat-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: relative;
        }
        .cat-card .rarity {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.8em;
            font-weight: bold;
            color: white;
        }
        .rarity.normal { background: #95a5a6; }
        .rarity.special { background: #3498db; }
        .rarity.rare { background: #9b59b6; }
        .rarity.super-rare { background: #e74c3c; }
        .rarity.uber-rare { background: linear-gradient(135deg, #FFD700, #FF6B9D); }
        .rarity.legend { background: linear-gradient(135deg, #1e3c72, #2a5298); }
        
        .result-display .cat-icon { font-size: 6em; margin: 20px 0; }
        .multi-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            width: 100%;
        }
        .multi-result-card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* Hamburger Pass Rainbow Styling */
        .hamburger-pass {
            position: relative;
            margin-top: 30px;
            border-radius: 20px;
            padding: 20px;
            overflow: hidden;
            color: white;
            text-align: center;
            background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
            background-size: 400% 400%;
            animation: rainbowScroll 5s linear infinite;
        }
        @keyframes rainbowScroll {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        .pass-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-family: "Luckiest Guy", cursive;
        }
        .hamburger-connect { background: #4caf50; }
        .roll-100 { background: #9c27b0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 Battle Cats Capsule 🎰</h1>
        <p class="subtitle">Test your luck and collect rare cats!</p>

        <div class="currency-display">
            <h2>Cat Food</h2>
            <div class="amount" id="catFood">8388607</div>
        </div>

        <div class="capsule-machine">
            <div class="capsule-display" id="capsuleDisplay">
                <div class="capsule-animation">🎰</div>
                <p style="color: #333; margin-top: 20px; font-size: 1.2em;">Ready to roll!</p>
            </div>

            <div class="pull-buttons">
                <button class="pull-btn pull-1" onclick="pullCapsule(1)">Pull 1x<br><small>150 CF</small></button>
                <button class="pull-btn pull-10" onclick="pullCapsule(10)">Pull 10x<br><small>1500 CF</small></button>
                <button class="pull-btn pull-11" onclick="pullCapsule(11)">Pull 11x (GUARANTEED RARE+)<br><small>1500 CF</small></button>
            </div>
        </div>

        <div class="hamburger-pass">
            <h3>🍔 Hamburger Pass 🌈</h3>
            <p>Only 1 CF: Guarantees ALL LEGENDS!</p>
            <div class="options" style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                <button class="pass-btn hamburger-connect" onclick="purchaseHamburgerPass()" id="hamburgerPassBtn">Activate Pass (1 CF)</button>
                <button class="pass-btn roll-100" onclick="pullHamburgerCapsule(100)" id="roll100Btn" disabled>Roll 100 LEGENDS!</button>
            </div>
        </div>

        <div class="inventory">
            <h3>📦 Your Cat Collection</h3>
            <div class="cats-grid" id="catsGrid"></div>
            <div id="stats" style="margin-top: 20px; display: flex; justify-content: space-around; font-weight: bold;">
                <span>Total Pulls: <span id="totalPulls">0</span></span>
                <span>Unique: <span id="uniqueCats">0</span></span>
                <span>Ubers/Legends: <span id="uberCount">0</span></span>
            </div>
        </div>
    </div>

    <script>
        const cats = [
            // Normal (60% drop rate)
            { name: "Cat", icon: "🐱", rarity: "normal" },
            { name: "Tank Cat", icon: "🛡️", rarity: "normal" },
            { name: "Axe Cat", icon: "🪓", rarity: "normal" },
            { name: "Gross Cat", icon: "🤢", rarity: "normal" },
            { name: "Cow Cat", icon: "🐮", rarity: "normal" },
            { name: "Bird Cat", icon: "🐦", rarity: "normal" },
            { name: "Fish Cat", icon: "🐟", rarity: "normal" },
            { name: "Lizard Cat", icon: "🦎", rarity: "normal" },

            // Special (25% drop rate)
            { name: "Ninja Cat", icon: "🥷", rarity: "special" },
            { name: "Zombie Cat", icon: "🧟", rarity: "special" },
            { name: "Samurai Cat", icon: "⚔️", rarity: "special" },
            { name: "Sumo Cat", icon: "🤼", rarity: "special" },

            // Rare (10% drop rate)
            { name: "Paris Cat", icon: "🗼", rarity: "rare" },
            { name: "Jurassic Cat", icon: "🦖", rarity: "rare" },
            { name: "Viking Cat", icon: "🪓", rarity: "rare" },
            { name: "Captain Cat", icon: "⚓", rarity: "rare" },

            // Super Rare (4% drop rate)
            { name: "Hacker Cat", icon: "💻", rarity: "super-rare" },
            { name: "Sushi Cat", icon: "🍣", rarity: "super-rare" },
            { name: "Nerd Cat", icon: "🤓", rarity: "super-rare" },

            // Uber Rare (0.9% drop rate)
            { name: "Dragon Cat", icon: "🐉", rarity: "uber-rare" },
            { name: "Demon Cat", icon: "😈", rarity: "uber-rare" },
            { name: "Angel Cat", icon: "😇", rarity: "uber-rare" },
            { name: "Kamukura Cat", icon: "👑", rarity: "uber-rare" },

            // Legend (0.1% drop rate)
            { name: "Legend Cat", icon: "⭐", rarity: "legend" },
            { name: "Mythic Cat", icon: "🌟", rarity: "legend" },
          { name: "Graffiti Cat", icon: "🥫", rarity: "legend" }
        ];

        let catFood = 8388607;
        let inventory = {};
        let totalPulls = 0;
        let hamburgerPassActive = false;

        function getRarityChance() {
            const rand = Math.random() * 100;
            if (rand < 0.1) return "legend";
            if (rand < 1) return "uber-rare";
            if (rand < 5) return "super-rare";
            if (rand < 15) return "rare";
            if (rand < 40) return "special";
            return "normal";
        }

        function pullCapsule(count) {
            let cost = count === 1 ? 150 : 1500;
            if (catFood < cost) { alert("Not enough Cat Food! 😿"); return; }
            
            catFood -= cost;
            updateUI();
            roll(count, false);
        }

        function purchaseHamburgerPass() {
            if (catFood < 1) { alert("Not enough Cat Food! 😿"); return; }
            catFood -= 1;
            hamburgerPassActive = true;
            document.getElementById('roll100Btn').disabled = false;
            document.getElementById('hamburgerPassBtn').disabled = true;
            updateUI();
            alert("Hamburger Pass Activated! Legends incoming! 🌈");
        }

        function pullHamburgerCapsule(count) {
            roll(count, true);
        }

        function roll(count, isLegendOnly) {
            const display = document.getElementById('capsuleDisplay');
            display.innerHTML = '<div class="capsule-animation">🎰</div><p>Rolling...</p>';

            setTimeout(() => {
                const results = [];
                for (let i = 0; i < count; i++) {
                    const targetRarity = isLegendOnly ? "legend" : getRarityChance();
                    const available = cats.filter(c => c.rarity === targetRarity);
                    const pulled = available[Math.floor(Math.random() * available.length)];
                    
                    results.push(pulled);
                    if (!inventory[pulled.name]) inventory[pulled.name] = { ...pulled, count: 0 };
                    inventory[pulled.name].count++;
                    totalPulls++;
                }
                displayResults(results);
                updateInventory();
                updateUI();
            }, 1000);
        }

        function displayResults(results) {
            const display = document.getElementById('capsuleDisplay');
            if (results.length === 1) {
                const cat = results[0];
                display.innerHTML = `<div class="result-display"><div class="cat-icon">${cat.icon}</div><h2>${cat.name}</h2><p class="rarity ${cat.rarity}">${cat.rarity.toUpperCase()}</p></div>`;
            } else {
                display.innerHTML = `<div class="multi-results">${results.map(cat => `<div class="multi-result-card"><div style="font-size:2em">${cat.icon}</div><div style="font-size:0.7em">${cat.name}</div></div>`).join('')}</div>`;
            }
        }

        function updateInventory() {
            const grid = document.getElementById('catsGrid');
            grid.innerHTML = Object.values(inventory).map(cat => `
                <div class="cat-card">
                    <div class="rarity ${cat.rarity}">${cat.rarity.toUpperCase()}</div>
                    <div class="icon">${cat.icon}</div>
                    <div class="name">${cat.name}</div>
                    <div class="count">x${cat.count}</div>
                </div>
            `).join('');
        }

        function updateUI() {
            document.getElementById('catFood').textContent = catFood;
            document.getElementById('totalPulls').textContent = totalPulls;
            document.getElementById('uniqueCats').textContent = Object.keys(inventory).length;
            document.getElementById('uberCount').textContent = Object.values(inventory).filter(c => c.rarity === 'uber-rare' || c.rarity === 'legend').length;
        }

        updateUI();
    </script>
</body>
</html>
