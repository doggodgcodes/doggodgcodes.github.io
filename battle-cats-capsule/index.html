<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Cats Capsule Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Luckiest Guy", cursive, sans-serif;
            /* SLOW RAINBOW BACKGROUND */
            background: linear-gradient(90deg, #ff9aa2, #ffb7b2, #ffdac1, #e2f0cb, #b5ead7, #c7ceea);
            background-size: 600% 600%;
            animation: slowRainbow 20s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        @keyframes slowRainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 800px;
            padding: 30px;
        }
        h1 { font-size: 2.5em; color: #FF6B9D; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        
        .currency-display {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        .amount { font-size: 3em; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        .capsule-machine {
            background: linear-gradient(135deg, #E94560, #C73659);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .capsule-display {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-height: 400px;
            overflow-y: auto;
        }
        .capsule-animation { font-size: 5em; animation: bounce 0.5s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .pull-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .pull-btn {
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            color: white;
            font-family: "Luckiest Guy", cursive;
        }
        .pull-1 { background: #667eea; }
        .pull-10 { background: #f093fb; }
        .pull-11 { background: #FFD700; color: #333; }

        .hamburger-pass {
            margin-top: 20px;
            padding: 20px;
            border-radius: 20px;
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff);
            background-size: 300% 300%;
            animation: slowRainbow 5s linear infinite;
            color: white;
            text-align: center;
        }

        .inventory { background: #f8f9fa; border-radius: 15px; padding: 20px; margin-top: 30px; }
        .cats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .cat-card { background: white; padding: 10px; border-radius: 10px; text-align: center; position: relative; border: 2px solid #ddd; }
        .rarity { font-size: 0.7em; padding: 2px 5px; border-radius: 4px; color: white; margin-bottom: 5px; }
        .rarity.normal { background: #95a5a6; }
        .rarity.legend { background: linear-gradient(to right, #1e3c72, #2a5298); }
        .rarity.uber-rare { background: gold; color: black; }
        
        .multi-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 5px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 Battle Cats Capsule 🎰</h1>
        <div class="currency-display">
            <h2>Cat Food | Total Value: <span id="catValue">0</span></h2>
            <div class="amount" id="catFood">8388607</div>
        </div>

        <div class="capsule-machine">
            <div class="capsule-display" id="capsuleDisplay">
                <div class="capsule-animation">🎰</div>
                <p>READY TO BONK!</p>
            </div>
            <div class="pull-buttons" style="margin-top:20px;">
                <button class="pull-btn pull-1" onclick="pullCapsule(1)">Pull 1x (150 CF)</button>
                <button class="pull-btn pull-10" onclick="pullCapsule(10)">Pull 10x (1500 CF)</button>
                <button class="pull-btn pull-11" onclick="pullCapsule(11)">Pull 11x (1500 CF)</button>
            </div>
        </div>

        <div class="hamburger-pass">
            <h3>🍔 Hamburger Pass Active: <span id="passStatus">OFF</span></h3>
            <button class="pull-btn" style="background:white; color:black;" onclick="purchaseHamburgerPass()" id="hamburgerPassBtn">Activate (1 CF)</button>
            <button class="pull-btn pull-11" onclick="pullHamburgerCapsule(100)" id="roll100Btn" disabled>ROLL 100 LEGENDS!</button>
        </div>

        <div class="inventory">
            <h3>📦 Collection (Saves Automatically!)</h3>
            <div class="cats-grid" id="catsGrid"></div>
            <div id="stats" style="margin-top: 15px; display: flex; justify-content: space-between;">
                <span>Total Pulls: <span id="totalPulls">0</span></span>
                <span>Ubers/Legends: <span id="uberCount">0</span></span>
            </div>
        </div>
    </div>

    <script>
        const cats = [
            { name: "Cat", icon: "🐱", rarity: "normal", value: 10 },
            { name: "Tank Cat", icon: "🛡️", rarity: "normal", value: 10 },
            { name: "Axe Cat", icon: "🪓", rarity: "normal", value: 10 },
            { name: "Gross Cat", icon: "🤢", rarity: "normal", value: 10 },
            { name: "Ninja Cat", icon: "🥷", rarity: "special", value: 50 },
            { name: "Zombie Cat", icon: "🧟", rarity: "special", value: 50 },
            { name: "Paris Cat", icon: "🗼", rarity: "rare", value: 100 },
            { name: "Jurassic Cat", icon: "🦖", rarity: "rare", value: 100 },
            { name: "Hacker Cat", icon: "💻", rarity: "super-rare", value: 500 },
            { name: "Sushi Cat", icon: "🍣", rarity: "super-rare", value: 500 },
            { name: "Dragon Cat", icon: "🐉", rarity: "uber-rare", value: 2000 },
            { name: "Kamukura", icon: "👑", rarity: "uber-rare", value: 2500 },
            // MORE LEGENDS!
            { name: "Legend Cat", icon: "⭐", rarity: "legend", value: 10000 },
            { name: "Mythic Cat", icon: "🌟", rarity: "legend", value: 10000 },
            { name: "Graffiti Cat", icon: "🥫", rarity: "legend", value: 10000 },
            { name: "Galaxy Cat", icon: "🌌", rarity: "legend", value: 15000 },
            { name: "Doge King", icon: "🐕", rarity: "legend", value: 20000 },
            { name: "Gorilla Tag Cat", icon: "🦍", rarity: "legend", value: 25000 },
            { name: "Absolute Universe Cat", icon: "🌌", rarity: "legend", value: 99999 }
        ];

        let catFood = 8388607;
        let inventory = JSON.parse(localStorage.getItem('battleCatsInventory')) || {};
        let totalPulls = parseInt(localStorage.getItem('battleCatsPulls')) || 0;
        let hamburgerPassActive = false;

        function saveGame() {
            localStorage.setItem('battleCatsInventory', JSON.stringify(inventory));
            localStorage.setItem('battleCatsPulls', totalPulls);
        }

        function getRarityChance() {
            const rand = Math.random() * 100;
            if (rand < 0.1) return "legend";
            if (rand < 1) return "uber-rare";
            if (rand < 5) return "super-rare";
            if (rand < 15) return "rare";
            if (rand < 40) return "special";
            return "normal";
        }

        function pullCapsule(count) {
            let cost = (count === 1) ? 150 : 1500;
            if (catFood < cost) return;
            catFood -= cost;
            roll(count, false);
        }

        function purchaseHamburgerPass() {
            if (catFood < 1) return;
            catFood -= 1;
            hamburgerPassActive = true;
            document.getElementById('roll100Btn').disabled = false;
            document.getElementById('passStatus').textContent = "ON! 🌈";
            updateUI();
            
            // PASSIVE INCOME LOOP
            setInterval(() => {
                if(hamburgerPassActive && Math.random() > 0.7) {
                    const randomCat = cats[Math.floor(Math.random() * cats.length)];
                    addToInventory(randomCat);
                    updateUI();
                    updateInventoryDisplay();
                }
            }, 100);
        }

        function pullHamburgerCapsule(count) { roll(count, true); }

        function roll(count, isLegendOnly) {
            const display = document.getElementById('capsuleDisplay');
            display.innerHTML = '<div class="capsule-animation">🎰</div><p>Rolling...</p>';

            setTimeout(() => {
                const results = [];
                for (let i = 0; i < count; i++) {
                    const targetRarity = isLegendOnly ? "legend" : getRarityChance();
                    const available = cats.filter(c => c.rarity === targetRarity);
                    const pulled = available[Math.floor(Math.random() * available.length)];
                    results.push(pulled);
                    addToInventory(pulled);
                    totalPulls++;
                }
                displayResults(results);
                updateInventoryDisplay();
                updateUI();
                saveGame();
            }, 800);
        }

        function addToInventory(cat) {
            if (!inventory[cat.name]) {
                inventory[cat.name] = { ...cat, count: 0 };
            }
            inventory[cat.name].count++;
        }

        function displayResults(results) {
            const display = document.getElementById('capsuleDisplay');
            if (results.length === 1) {
                const cat = results[0];
                display.innerHTML = `<div><div style="font-size:5em">${cat.icon}</div><h2>${cat.name}</h2></div>`;
            } else {
                display.innerHTML = `<div class="multi-results">${results.map(c => `<div>${c.icon}</div>`).join('')}</div>`;
            }
        }

        function updateInventoryDisplay() {
            const grid = document.getElementById('catsGrid');
            grid.innerHTML = Object.values(inventory).map(cat => `
                <div class="cat-card">
                    <div class="rarity ${cat.rarity}">${cat.rarity.toUpperCase()}</div>
                    <div style="font-size:2em">${cat.icon}</div>
                    <div style="font-size:0.8em">${cat.name}</div>
                    <div>x${cat.count}</div>
                </div>
            `).join('');
        }

        function updateUI() {
            document.getElementById('catFood').textContent = catFood;
            document.getElementById('totalPulls').textContent = totalPulls;
            
            let totalVal = 0;
            let ubers = 0;
            Object.values(inventory).forEach(c => {
                totalVal += (c.value * c.count);
                if(c.rarity === 'uber-rare' || c.rarity === 'legend') ubers += c.count;
            });
            document.getElementById('catValue').textContent = totalVal;
            document.getElementById('uberCount').textContent = ubers;
        }

        // INIT
        updateInventoryDisplay();
        updateUI();
    </script>
</body>
</html>
