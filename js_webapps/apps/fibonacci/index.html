<!doctype html>
<html>
  <head>
    <meta name="robots" content="noindex, nofollow">
    <title>Fibonacci Sequence with JavaScript</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body>
    <h1>Fibonacci Sequence (generated by JavaScript)</h1>
    <h4></h4>
    <script>
      let nums = [0,1];
      let index = 0;
      let text = document.querySelector("h4");

      for (let i = 0; i < 98; i++) {
          index = nums.length;
          nums.push(nums[index-2]+nums[index-1]);
      }

      text.textContent = nums;
      console.log(nums.length);
    </script>
  </body>
</html>
